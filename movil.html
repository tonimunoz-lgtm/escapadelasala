<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ESCAPE CLASS — Mòbil</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
:root{
  --bg:#06060e;--accent:#ff6b00;--accent2:#00f5ff;
  --text:#f0e6d3;--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.09);
  --green:#00ff88;--red:#ff4444;--gold:#ffd700;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;
  display:flex;flex-direction:column;transition:background .8s}

/* SCREENS */
.screen{display:none;flex-direction:column;height:100%;overflow-y:auto;padding:16px}
.screen.active{display:flex}

/* LANG */
.lang-sw{position:fixed;top:10px;right:10px;z-index:9999;display:flex;gap:4px}
.lb{background:rgba(255,255,255,.08);border:1px solid var(--accent);color:var(--text);
  padding:4px 10px;border-radius:20px;font-family:'Rajdhani',sans-serif;
  font-weight:700;font-size:11px;cursor:pointer;transition:all .3s}
.lb.on{background:var(--accent);color:#000}

/* ══ JOIN ══ */
#s-join{
  justify-content:center;align-items:center;
  background:radial-gradient(ellipse at center,#1a0a2e,#06060e);
  position:relative;overflow:hidden
}
.join-stars{position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 15% 25%,rgba(255,255,255,.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 40% 60%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 20%,rgba(0,245,255,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 85% 70%,rgba(255,107,0,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 40%,rgba(255,255,255,.6) 0%,transparent 100%);
  animation:tw 3s ease-in-out infinite alternate}
@keyframes tw{from{opacity:.5}to{opacity:1}}

.join-card{background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:22px;padding:28px 22px;width:100%;max-width:360px;
  backdrop-filter:blur(20px);z-index:1;text-align:center}
.logo-m{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:3px}
.logo-sm{font-size:.65rem;letter-spacing:3px;color:rgba(255,255,255,.28);
  text-transform:uppercase;margin-bottom:24px}

.inp-grp{margin-bottom:13px;text-align:left}
.inp-lbl{font-size:.65rem;letter-spacing:2px;color:var(--accent2);
  text-transform:uppercase;margin-bottom:5px;display:block}
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:11px;padding:13px 14px;color:var(--text);
  font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:600;
  outline:none;transition:all .3s;-webkit-appearance:none}
.inp:focus{border-color:var(--accent);background:rgba(255,107,0,.05)}
.inp::placeholder{color:rgba(255,255,255,.18)}
.code-inp{font-family:'Orbitron',sans-serif;font-size:1.5rem;
  text-align:center;letter-spacing:8px;text-transform:uppercase}

.emoji-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:10px 0}
.eo{font-size:1.5rem;padding:7px;border-radius:9px;cursor:pointer;
  background:rgba(255,255,255,.04);border:2px solid transparent;
  transition:all .2s;text-align:center}
.eo.sel{border-color:var(--accent);background:rgba(255,107,0,.15)}

.join-btn{width:100%;padding:15px;border-radius:13px;border:none;
  font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:900;
  letter-spacing:2px;cursor:pointer;text-transform:uppercase;
  background:linear-gradient(135deg,var(--accent),#ff0080);
  color:#fff;transition:all .3s;margin-top:6px}
.join-btn:active{transform:scale(.97)}
.join-btn:disabled{opacity:.4}

.err-msg{color:var(--red);font-size:.82rem;margin-top:7px;
  padding:7px 11px;background:rgba(255,68,68,.1);border-radius:8px;display:none}
.err-msg.show{display:block}

/* ══ WAITING ══ */
#s-wait{
  justify-content:center;align-items:center;text-align:center;
  background:radial-gradient(ellipse at center,#1a0a2e,#06060e)
}
.w-emoji{font-size:3.5rem;animation:wBounce 2s ease-in-out infinite}
@keyframes wBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.w-title{font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:900;
  margin:14px 0 6px;color:var(--accent2)}
.w-team{font-size:1.1rem;font-weight:700;margin-bottom:20px;
  background:rgba(255,255,255,.05);padding:10px 20px;border-radius:11px}
.dots{display:flex;gap:7px;justify-content:center;margin:18px 0}
.dot{width:9px;height:9px;border-radius:50%;background:var(--accent);
  animation:dp 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.room-badge{background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:11px;padding:11px 18px;margin-top:14px}
.rb-lbl{font-size:.6rem;letter-spacing:2px;color:rgba(255,255,255,.28);text-transform:uppercase}
.rb-code{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;
  color:var(--accent);letter-spacing:4px}

/* ══ GAME ══ */
#s-game{padding:14px;gap:0;overflow-y:auto}

.g-top{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:13px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.my-score{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1rem;color:var(--accent2)}
.score-lbl{font-size:.58rem;letter-spacing:2px;color:rgba(255,255,255,.28);text-transform:uppercase}
.phase-chip-m{font-size:.6rem;letter-spacing:2px;color:var(--accent);text-transform:uppercase;text-align:center}
.timer-m{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:700;text-align:right}
.timer-m.urg{color:var(--red);animation:tSh .5s ease-in-out infinite}
@keyframes tSh{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

.story-hdr{background:rgba(255,255,255,.03);border-radius:13px;
  padding:12px 14px;margin-bottom:12px;border:1px solid var(--border)}
.ph-name-m{font-size:.6rem;letter-spacing:3px;color:var(--accent2);text-transform:uppercase;margin-bottom:3px}
.narr-title-m{font-size:1rem;font-weight:700;line-height:1.2}

.narr-text-m{background:rgba(255,255,255,.03);border-radius:13px;
  padding:12px 14px;margin-bottom:12px;font-size:.88rem;line-height:1.6;
  color:rgba(240,230,211,.78);border:1px solid var(--border);
  max-height:130px;overflow-y:auto}

/* Inventory bar */
.inv-bar{background:rgba(0,0,0,.5);border-radius:10px;padding:10px 14px;margin-bottom:12px;
  border:1px solid var(--border)}
.inv-lbl{font-size:.6rem;letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:5px}
.inv-items{display:flex;gap:8px;font-size:1.4rem}

.enigma-card{background:rgba(255,107,0,.06);border:1px solid rgba(255,107,0,.22);
  border-radius:13px;padding:14px;margin-bottom:12px}
.e-lbl{font-size:.6rem;letter-spacing:2px;color:var(--accent);
  text-transform:uppercase;margin-bottom:7px;display:block}
.e-text{font-size:.92rem;font-weight:600;line-height:1.5}

/* Choice buttons */
.choice-container{display:flex;gap:10px;flex-direction:column;margin-top:15px}
.choice-btn{padding:14px;background:var(--panel);border:1px solid var(--border);
  border-radius:10px;color:var(--text);cursor:pointer;font-family:inherit;
  font-size:.95rem;transition:all .3s;display:flex;align-items:center;gap:10px}
.choice-btn:active{transform:scale(.98)}
.choice-btn.selected{border-color:var(--accent);background:rgba(255,107,0,.15)}

/* QR Scanner */
#qr-reader{width:100%;max-width:300px;margin:0 auto 15px;border-radius:10px;overflow:hidden}
#qr-reader video{border-radius:10px}

.feedback-card{border-radius:13px;padding:14px;text-align:center;
  margin-bottom:12px;display:none;
  animation:fbIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes fbIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.feedback-card.show{display:block}
.feedback-card.ok{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.28)}
.feedback-card.ko{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.28)}
.fb-emoji{font-size:2.2rem;margin-bottom:6px}
.fb-title{font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:900;margin-bottom:3px}
.fb-pts{font-size:.8rem;color:var(--accent2)}

.ans-section{margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
.ans-inp{width:100%;background:rgba(255,255,255,.06);border:2px solid var(--border);
  border-radius:13px;padding:14px;color:var(--text);
  font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:
    outline:none;transition:all .3s;text-align:center;-webkit-appearance:none;
  letter-spacing:2px;text-transform:uppercase}
.ans-inp:focus{border-color:var(--accent);background:rgba(255,107,0,.06)}
.ans-inp.ok{border-color:var(--green);background:rgba(0,255,136,.06)}
.ans-inp.ko{border-color:var(--red);background:rgba(255,68,68,.06);animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

.submit-btn{width:100%;padding:16px;border-radius:13px;border:none;
  font-family:'Orbitron',sans-serif;font-size:.92rem;font-weight:900;
  letter-spacing:2px;cursor:pointer;text-transform:uppercase;
  background:linear-gradient(135deg,var(--accent),#ff0080);
  color:#fff;transition:all .3s;position:relative;overflow:hidden}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{opacity:.5}
.submit-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  transform:translateX(-100%);animation:shim 2s infinite}
@keyframes shim{to{transform:translateX(100%)}}

/* Shake action button */
.shake-btn{width:100%;padding:16px;border-radius:13px;border:1px solid var(--accent);
  background:rgba(255,107,0,.1);color:var(--text);font-family:'Orbitron',sans-serif;
  font-size:.92rem;font-weight:900;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:10px;margin-bottom:12px}
.shake-btn:active{transform:scale(.95);background:rgba(255,107,0,.2)}

.hint-row{background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:11px;padding:11px 14px;margin-bottom:12px;
  display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .3s}
.hint-row:active{background:rgba(255,255,255,.07)}
.hint-txt{font-size:.82rem;color:rgba(255,255,255,.38);font-style:italic}

.rank-mini{background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:13px;padding:13px;margin-bottom:12px}
.rank-hdr{font-size:.6rem;letter-spacing:2px;color:var(--accent);
  text-transform:uppercase;margin-bottom:9px}
.ri-m{display:flex;align-items:center;gap:7px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04);font-size:.83rem}
.ri-me{background:rgba(255,107,0,.1);border-radius:6px;padding:2px 6px}

/* voice btn mobile */
.voice-btn-m{width:100%;padding:12px;border-radius:11px;border:1px solid var(--border);
  background:rgba(255,255,255,.05);color:var(--text);font-family:'Rajdhani',sans-serif;
  font-weight:700;font-size:.88rem;cursor:pointer;letter-spacing:1px;
  transition:all .3s;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.voice-btn-m.spk{background:rgba(255,107,0,.2);border-color:var(--accent)}

/* ══ WINNER ══ */
#s-win{justify-content:center;align-items:center;text-align:center;
  background:radial-gradient(ellipse at center,#1a0d00,#06060e);
  position:relative;overflow:hidden}
.conf-m{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.cp-m{position:absolute;animation:cpF linear infinite}
@keyframes cpF{0%{transform:translateY(-60px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.w-crown{font-size:3.5rem;animation:crB 1s ease-in-out infinite}
@keyframes crB{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-9px) rotate(5deg)}}
.w-lbl{font-family:'Orbitron',sans-serif;font-size:.68rem;letter-spacing:4px;
  color:var(--accent2);margin:11px 0 5px;text-transform:uppercase}
.w-name{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.4rem;
  background:linear-gradient(135deg,var(--gold),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px}
.my-sc-box{background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.28);
  border-radius:11px;padding:14px;margin:16px 0}
.ms-lbl{font-size:.6rem;letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:3px}
.ms-val{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;color:var(--accent)}
.replay-btn{width:100%;padding:14px;border-radius:13px;border:none;
  font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:900;
  letter-spacing:2px;cursor:pointer;text-transform:uppercase;
  background:linear-gradient(135deg,var(--accent),#ff0080);color:#fff;margin-top:14px}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
</style>
</head>
<body>

<div class="lang-sw">
  <button class="lb on" onclick="setLang('ca')" id="lb-ca">CA</button>
  <button class="lb" onclick="setLang('es')" id="lb-es">ES</button>
</div>

<!-- JOIN -->
<div class="screen active" id="s-join">
  <div class="join-stars"></div>
  <div class="join-card">
    <div class="logo-m">ESCAPE CLASS</div>
    <div class="logo-sm" data-i18n="join_sub">Uneix-te a l'aventura</div>

    <div class="inp-grp">
      <label class="inp-lbl" data-i18n="code_lbl">CODI DE SALA</label>
      <input class="inp code-inp" id="codeInp" type="text" maxlength="4"
        placeholder="XXXX" autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="inp-grp">
      <label class="inp-lbl" data-i18n="name_lbl">NOM DE L'EQUIP</label>
      <input class="inp" id="nameInp" type="text" maxlength="20"
        placeholder="Els Exterminadors" autocomplete="off">
    </div>
    <div class="inp-grp">
      <label class="inp-lbl" data-i18n="members_lbl">MEMBRES (separats per coma)</label>
      <input class="inp" id="membersInp" type="text" maxlength="60"
        placeholder="Anna, Carles, Sofia" autocomplete="off">
    </div>
    <div class="inp-grp">
      <label class="inp-lbl" data-i18n="emoji_lbl">EMOJI DE L'EQUIP</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="err-msg" id="errMsg"></div>
    <button class="join-btn" onclick="joinRoom()" id="joinBtn" data-i18n="join_btn">⚡ UNIR-SE A L'AVENTURA</button>
  </div>
</div>

<!-- WAITING -->
<div class="screen" id="s-wait">
  <div class="w-emoji" id="wEmoji">⚡</div>
  <div class="w-title" data-i18n="wait_title">EQUIP REGISTRAT!</div>
  <div class="w-team" id="wTeam"></div>
  <div style="font-size:.85rem;color:rgba(255,255,255,.38);margin-bottom:18px" data-i18n="wait_msg">Esperant que el professor iniciï el joc...</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="room-badge">
    <div class="rb-lbl" data-i18n="your_room">LA TEVA SALA</div>
    <div class="rb-code" id="wCode">----</div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="s-game">
  <div class="g-top">
    <div><div class="score-lbl" data-i18n="pts_lbl">PUNTS</div><div class="my-score" id="myScoreEl">0</div></div>
    <div class="phase-chip-m" id="phaseChipM"></div>
    <div><div class="score-lbl" style="text-align:right" data-i18n="time_lbl">TEMPS</div><div class="timer-m" id="timerM">--:--</div></div>
  </div>

  <div class="story-hdr">
    <div class="ph-name-m" id="phNameM"></div>
    <div class="narr-title-m" id="narrTitleM"></div>
  </div>

  <div class="narr-text-m" id="narrTextM"></div>

  <div class="inv-bar" id="invBar" style="display:none">
    <div class="inv-lbl">🎒 INVENTARI</div>
    <div class="inv-items" id="invItems"></div>
  </div>

  <div class="enigma-card">
    <span class="e-lbl" data-i18n="enigma_lbl">🔐 ENIGMA</span>
    <div class="e-text" id="enigmaM"></div>
    <div class="choice-container" id="choiceContainer" style="display:none"></div>
  </div>

  <div class="feedback-card" id="fbCard">
    <div class="fb-emoji" id="fbEmoji"></div>
    <div class="fb-title" id="fbTitle"></div>
    <div class="fb-pts" id="fbPts"></div>
  </div>

  <!-- QR Scanner container -->
  <div id="qr-reader" style="display:none"></div>

  <div class="ans-section" id="ansSection">
    <input class="ans-inp" id="ansInp" type="text"
      placeholder="LA TEVA RESPOSTA" autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="this.value=this.value.toUpperCase()"
      onkeypress="if(event.key==='Enter')submitAnswer()">
    <button class="submit-btn" onclick="submitAnswer()" id="submitBtn" data-i18n="submit_btn">ENVIAR RESPOSTA</button>
  </div>

  <button class="shake-btn" id="shakeBtn" onclick="handleShake()" style="display:none">
    📳 SACSEJA EL MÒBIL
  </button>

  <button class="voice-btn-m" id="voiceBtnM" onclick="toggleVoiceMobile()">🔊 <span data-i18n="listen_narration">Escoltar narració</span></button>

  <div class="hint-row" onclick="toggleHint()">
    <span>💡</span>
    <span class="hint-txt" id="hintTxtM" data-i18n="hint_tap">Toca per veure la pista</span>
    <span style="opacity:.4">›</span>
  </div>

  <div class="rank-mini">
    <div class="rank-hdr" data-i18n="ranking_lbl">🏆 RÀNQUING</div>
    <div id="rankMini"></div>
  </div>
</div>

<!-- WINNER -->
<div class="screen" id="s-win">
  <div class="conf-m" id="confM"></div>
  <div style="z-index:1;width:100%">
    <div class="w-crown">🏆</div>
    <div class="w-lbl" data-i18n="end_lbl">FI DE L'AVENTURA!</div>
    <div class="w-name" id="winNameM"></div>
    <div class="my-sc-box">
      <div class="ms-lbl" data-i18n="your_score">LA TEVA PUNTUACIÓ</div>
      <div class="ms-val" id="myFinalScore">0</div>
    </div>
    <div id="rankFinal"></div>
    <button class="replay-btn" onclick="resetToJoin()" data-i18n="back_btn">🔄 TORNAR A L'INICI</button>
  </div>
</div>

    members_lbl:"MEMBRES (separats per coma)",emoji_lbl:"EMOJI DE L'EQUIP",

// ── AUDIO ──
let audioCtx=null,soundEnabled=true;
function getAC(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playFx(type){
  if(!soundEnabled) return;
  try{
    const ctx=getAC();
    const g=ctx.createGain();g.connect(ctx.destination);
    if(type==='correct'){
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator(),og=ctx.createGain();
        o.type='sine';o.frequency.value=f;o.connect(og);og.connect(ctx.destination);
        const st=ctx.currentTime+i*.1;
        og.gain.setValueAtTime(0,st);og.gain.linearRampToValueAtTime(.25,st+.05);
        og.gain.exponentialRampToValueAtTime(.001,st+.4);o.start(st);o.stop(st+.5);
      });
    } else if(type==='wrong'){
      const o=ctx.createOscillator();o.type='sawtooth';
      o.frequency.setValueAtTime(200,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(100,ctx.currentTime+.3);
      g.gain.setValueAtTime(.2,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
      o.connect(g);o.start();o.stop(ctx.currentTime+.5);
    } else if(type==='join'){
      const o=ctx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(440,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(880,ctx.currentTime+.15);
      g.gain.setValueAtTime(.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
      o.connect(g);o.start();o.stop(ctx.currentTime+.4);
    } else if(type==='phase'){
      [200,300,400].forEach((f,i)=>{
        const o=ctx.createOscillator(),og=ctx.createGain();
        o.type='triangle';o.frequency.value=f;og.gain.value=.12;
        o.connect(og);og.connect(ctx.destination);
        o.start(ctx.currentTime+i*.05);o.stop(ctx.currentTime+.5);
      });
    } else if(type==='win'){
      [523,659,784,1047,784,1047,1319].forEach((f,i)=>{
        const o=ctx.createOscillator(),og=ctx.createGain();
        o.type='triangle';o.frequency.value=f;og.gain.value=0;
        o.connect(og);og.connect(ctx.destination);
        const st=ctx.currentTime+i*.12;
        og.gain.setValueAtTime(0,st);og.gain.linearRampToValueAtTime(.28,st+.05);
        og.gain.exponentialRampToValueAtTime(.001,st+.45);
        o.start(st);o.stop(st+.5);
      });
    } else if(type==='shake'){
      const o=ctx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(200,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(100,ctx.currentTime+.1);
      g.gain.setValueAtTime(.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);
      o.connect(g);o.start();o.stop(ctx.currentTime+.2);
    }
  }catch(e){}
}

let isSpeakingM=false,ainaAudio=null;
function speakM(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='ca'?'ca-ES':'es-ES';
  u.rate=.88;u.pitch=.85;u.volume=1;
  const voices=speechSynthesis.getVoices();
  const catalanVoice=voices.find(v=>v.lang.includes('ca'));
  if(catalanVoice) u.voice=catalanVoice;
  u.onstart=()=>{isSpeakingM=true;document.getElementById('voiceBtnM').classList.add('spk')};
  u.onend=()=>{isSpeakingM=false;document.getElementById('voiceBtnM').classList.remove('spk')};
  speechSynthesis.speak(u);
}

// ── JOIN ──
function joinRoom(){
  try{getAC();}catch(e){}
  const code=document.getElementById('codeInp').value.trim().toUpperCase();
  const name=document.getElementById('nameInp').value.trim();
  const members=document.getElementById('membersInp').value.trim();
  if(!code){showErr(t('enter_code'));return;}
  if(!name){showErr(t('fill_all'));return;}

  myRoomCode=code;
  myTeamId=`team_${Date.now()}_${Math.random().toString(36).substr(2,5)}`;
  myTeam={id:myTeamId,name,members,emoji:selectedEmoji,lives:3,inventory:[]};
  myLives=3;
  myInventory=[];

  db.ref(`rooms/${code}/teams/${myTeamId}`).set(myTeam)
    .then(()=>{
      return db.ref(`rooms/${code}/scores/${myTeamId}`).set({name,emoji:selectedEmoji,score:0,lives:3});
    })
    .then(()=>{
      document.getElementById('wEmoji').textContent=selectedEmoji;
      document.getElementById('wTeam').textContent=`${selectedEmoji} ${name}`;
      document.getElementById('wCode').textContent=code;
      playFx('join');
      showScreen('s-wait');
      startListening();
    })
    .catch(err=>{
      console.error("Firebase error:",err);
      showErr("Error de connexió: "+err.message);
    });
}

// ── FIREBASE LISTENERS ──
function startListening(){
  if(phaseRef) phaseRef.off();
  phaseRef=db.ref(`rooms/${myRoomCode}/phase`);
  phaseRef.on('value',snap=>{
    const data=snap.val();
    if(!data) return;
    if(data.phase!==lastPhaseIdx){
      lastPhaseIdx=data.phase;
      currentPhaseData=data;
      hintShown=false;
      answerSubmitted=false;
      document.getElementById('hintTxtM').textContent=t('hint_hidden');
      document.getElementById('fbCard').classList.remove('show','ok','ko');
      
      // Afegir reward a inventari si existeix
      if(data.reward){
        myInventory.push(data.reward);
        updateInventory();
      }
      
      enterGame(data);
    }
  });

  if(timerRef) timerRef.off();
  timerRef=db.ref(`rooms/${myRoomCode}/timer`);
  timerRef.on('value',snap=>{
    const tl=snap.val();
    if(tl==null) return;
    const m=Math.floor(tl/60),s=tl%60;
    const el=document.getElementById('timerM');
    el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.classList.toggle('urg',tl<120);
  });

  if(scoresRef) scoresRef.off();
  scoresRef=db.ref(`rooms/${myRoomCode}/scores`);
  scoresRef.on('value',snap=>{
    const data=snap.val()||{};
    const myData=data[myTeamId];
    if(myData){
      myScore=myData.score||0;
      myLives=myData.lives||3;
      document.getElementById('myScoreEl').textContent=myScore;
    }
    renderRankMini(data);
  });

  if(winnerRef) winnerRef.off();
  winnerRef=db.ref(`rooms/${myRoomCode}/winner`);
  winnerRef.on('value',snap=>{
    const w=snap.val();
    if(w&&w.ts) showWinner(w);
  });

  db.ref(`rooms/${myRoomCode}/hint`).on('value',snap=>{
    const h=snap.val();
    if(!h||!h.text) return;
    const txt=h.text[lang]||'';
    if(txt) document.getElementById('hintTxtM').textContent=txt;
  });
}

function updateInventory(){
  const bar=document.getElementById('invBar');

    items.innerHTML=myInventory.map(i=>`<span>${i}</span>`).join('');

// ── SHAKE DETECTION ──
function initShakeDetection(){
  if(!window.DeviceMotionEvent){
    showErr("El teu dispositiu no suporta detecció de moviment");
    return;
  }
  
  let lastX=0,lastY=0,lastZ=0;
  let shakeCount=0;
  const threshold=15;
  const neededShakes=5;
  
  function handleMotion(event){
    const acc=event.accelerationIncludingGravity;
    if(!acc) return;
    
    const deltaX=Math.abs(acc.x-lastX);
    const deltaY=Math.abs(acc.y-lastY);
    const deltaZ=Math.abs(acc.z-lastZ);
    
    if(deltaX>threshold || deltaY>threshold || deltaZ>threshold){
      shakeCount++;
      playFx('shake');
      if(shakeCount>=neededShakes){
        window.removeEventListener('devicemotion',handleMotion);
        submitAnswer('SHAKE_COMPLETE');
        document.getElementById('shakeBtn').textContent='✅ COMPLETAT!';
        navigator.vibrate?.([100,50,100,50,200]);
      } else {
        document.getElementById('shakeBtn').textContent=`📳 ${shakeCount}/${neededShakes}`;
        navigator.vibrate?.(50);
      }
    }
    
    lastX=acc.x;lastY=acc.y;lastZ=acc.z;
  }
  
  window.addEventListener('devicemotion',handleMotion);
}

function handleShake(){
  // Botó manual per si el sensor falla
  submitAnswer('SHAKE_COMPLETE');
}

// ── CHOICE SELECTION ──
function submitChoice(idx){
  if(answerSubmitted) return;
  answerSubmitted=true;
  
  const choice=currentPhaseData.choices[idx];
  
  // Marcar seleccionat
  document.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.classList.toggle('selected',i===idx);
    btn.disabled=true;
  });
  
  // Enviar a Firebase
  db.ref(`rooms/${myRoomCode}/answers`).push({
    teamId:myTeamId,teamName:myTeam.name,emoji:myTeam.emoji,
    answer:choice.text[lang],choiceIdx:idx,correct:true,pts:currentPhaseData.points||100,
    phase:currentPhaseData.phase,ts:Date.now()
  });
  
  showFeedback(true,currentPhaseData.points||100);
}

// ── SUBMIT ANSWER ──
function submitAnswer(ans){
  if(answerSubmitted) return;
  const answer=ans||document.getElementById('ansInp').value.trim();
  if(!answer) return;
  
  answerSubmitted=true;
  const phase=currentPhaseData;
  if(!phase) return;

  const correctAns=(phase.answer?.toLowerCase().trim()||'');
  const correct=answer.toLowerCase()===correctAns||correctAns==='variable'||ans==='SHAKE_COMPLETE';
  const pts=correct?(phase.points||100):0;

  const fb=document.getElementById('fbCard');
  fb.classList.remove('ok','ko');
  fb.classList.add('show',correct?'ok':'ko');
  document.getElementById('fbEmoji').textContent=correct?'🎉':'❌';
  document.getElementById('fbTitle').textContent=correct?t('correct'):t('wrong');
  document.getElementById('fbPts').textContent=correct?`+${pts} ${t('pts')}`:'-';
  
  const inp=document.getElementById('ansInp');
  if(inp) inp.className='ans-inp '+(correct?'ok':'ko');

  if(correct){
    myScore+=pts;
    document.getElementById('myScoreEl').textContent=myScore;
    db.ref(`rooms/${myRoomCode}/scores/${myTeamId}`).transaction(cur=>{
      const sc=cur||{name:myTeam.name,emoji:myTeam.emoji,score:0,lives:3};
      sc.score=myScore;
      return sc;
    });
  } else {
    myLives--;
    if(navigator.vibrate) navigator.vibrate([200]);
  }

  db.ref(`rooms/${myRoomCode}/answers`).push({
    teamId:myTeamId,teamName:myTeam.name,emoji:myTeam.emoji,
    answer,correct,pts,phase:phase.phase,ts:Date.now()
  });

  document.getElementById('submitBtn').disabled=true;
  playFx(correct?'correct':'wrong');
}

function showFeedback(correct,pts){
  const fb=document.getElementById('fbCard');
  fb.classList.remove('ok','ko');
  fb.classList.add('show',correct?'ok':'ko');
  document.getElementById('fbEmoji').textContent=correct?'🎉':'❌';
  document.getElementById('fbTitle').textContent=correct?t('correct'):t('wrong');
  document.getElementById('fbPts').textContent=correct?`+${pts} ${t('pts')}`:'-';
  playFx(correct?'correct':'wrong');
  if(navigator.vibrate) navigator.vibrate(correct?[80,40,80]:[200]);
}

  myTeam=null;myRoomCode='';myScore=0;myTeamId='';
  currentPhaseData=null;lastPhaseIdx=-1;answerSubmitted=false;
  myInventory=[];myLives=3;
  speechSynthesis.cancel();
  if(qrScanner){
    qrScanner.stop().catch(()=>{});
    qrScanner=null;
  }
  document.getElementById('codeInp').value='';
  document.getElementById('nameInp').value='';
  document.getElementById('invBar').style.display='none';
  showScreen('s-join');
}

(function(){
  const p=new URLSearchParams(window.location.search);
  const s=p.get('sala');
  if(s) document.getElementById('codeInp').value=s.toUpperCase();
  initEmojis();
})();
</script>
