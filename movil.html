<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ESCAPE CLASS — Mòbil Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;600;700&family=Exo+2:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="minigames.js"></script>

<style>
:root{
  --bg:#050508;--accent:#ff6b00;--accent2:#00f5ff;--pink:#ff0080;
  --gold:#ffd700;--green:#00ff88;--red:#ff4444;--purple:#a855f7;
  --glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow:hidden;font-family:'Rajdhani',sans-serif;background:var(--bg);color:#fff}

/* PARTICULAS DE FONDO */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;opacity:0;animation:float 8s infinite}

/* SCREENS CON EFECTO 3D */
.screen{display:none;height:100%;overflow-y:auto;padding:20px;position:relative;z-index:1;perspective:1000px;transform-style:preserve-3d}
.screen.active{display:flex;flex-direction:column}

/* CARDS CON GLASSMORPHISM */
.glass-card{
  background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.01));
  backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;
  padding:24px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px rgba(255,255,255,0.05);
  transform:translateZ(0);transition:all 0.3s ease;animation:cardEnter 0.6s ease
}
@keyframes cardEnter{from{opacity:0;transform:translateY(30px) rotateX(10deg)}to{opacity:1;transform:none}}
.glass-card:active{transform:scale(0.98)}

/* HEADER DINAMICO */
.dynamic-header{
  position:fixed;top:0;left:0;right:0;height:70px;background:linear-gradient(180deg,rgba(5,5,8,0.9),transparent);
  backdrop-filter:blur(10px);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  border-bottom:1px solid var(--border);transition:all 0.3s
}
.header-scrolled{background:rgba(5,5,8,0.98)}

/* TIMER CON PULSACION CRITICA */
.timer-container{
  font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  position:relative
}
.timer-critical{color:var(--red);animation:criticalPulse 0.5s infinite;text-shadow:0 0 20px var(--red)}
@keyframes criticalPulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* SISTEMA DE VIDAS ANIMADO */
.lives-container{display:flex;gap:8px;align-items:center}
.life-heart{font-size:1.8rem;transition:all 0.3s;text-shadow:0 0 10px currentColor}
.life-heart.lost{filter:grayscale(1) opacity(0.2);transform:scale(0.7)}
.life-heart.damaged{animation:damageShake 0.5s;color:var(--red)}
@keyframes damageShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px) rotate(-5deg)}75%{transform:translateX(5px) rotate(5deg)}}

/* PROGRESO DE FASES */
.phase-tracker{display:flex;gap:8px;margin-bottom:20px;justify-content:center}
.phase-dot{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);transition:all 0.3s;position:relative;overflow:hidden}
.phase-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent)}
.phase-dot.completed{background:var(--green)}
.phase-dot::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);animation:shimmer 2s infinite}

/* NARRATIVA CON SCROLL ESTILIZADO */
.narrative-box{
  max-height:180px;overflow-y:auto;padding:16px;background:rgba(0,0,0,0.3);border-radius:12px;
  border-left:3px solid var(--accent);font-size:0.95rem;line-height:1.6;color:#e0e0e0;margin-bottom:16px
}
.narrative-box::-webkit-scrollbar{width:4px}
.narrative-box::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* ZONA DE JUEGO INTERACTIVA */
.game-stage{
  min-height:200px;background:radial-gradient(ellipse at center,rgba(255,255,255,0.02),transparent);
  border:2px dashed var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;margin-bottom:16px
}
.game-stage.active{border-color:var(--accent);background:radial-gradient(ellipse at center,rgba(255,107,0,0.05),transparent)}
.game-stage::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='1' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E")}

/* INPUT ESTILO TERMINAL */
.terminal-input{
  width:100%;background:rgba(0,0,0,0.6);border:2px solid var(--border);border-radius:12px;
  padding:16px;font-family:'Orbitron',monospace;font-size:1.2rem;color:var(--accent2);
  text-align:center;letter-spacing:2px;text-transform:uppercase;outline:none;
  transition:all 0.3s;box-shadow:inset 0 2px 10px rgba(0,0,0,0.5)
}
.terminal-input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(255,107,0,0.3),inset 0 2px 10px rgba(0,0,0,0.5)}
.terminal-input.success{border-color:var(--green);color:var(--green);animation:successPulse 0.5s}
.terminal-input.error{border-color:var(--red);color:var(--red);animation:errorShake 0.4s}
@keyframes successPulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes errorShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

/* BOTONES ACCION */
.action-btn{
  width:100%;padding:18px;border:none;border-radius:14px;font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:1rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;
  background:linear-gradient(135deg,var(--accent),var(--pink));color:#fff;position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(255,107,0,0.4)
}
.action-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transform:translateX(-100%);transition:transform 0.5s}
.action-btn:active{transform:scale(0.95);box-shadow:0 2px 10px rgba(255,107,0,0.3)}
.action-btn:hover::before{transform:translateX(100%)}
.action-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* HINT DESPLEGABLE */
.hint-container{
  background:rgba(255,215,0,0.05);border:1px solid rgba(255,215,0,0.2);border-radius:12px;
  padding:12px;margin-bottom:16px;cursor:pointer;transition:all 0.3s
}
.hint-container.revealed{background:rgba(255,215,0,0.1);border-color:var(--gold)}
.hint-icon{font-size:1.5rem;margin-right:8px}
.hint-text{font-size:0.85rem;color:var(--gold);font-style:italic;max-height:0;overflow:hidden;transition:max-height 0.3s}
.hint-container.revealed .hint-text{max-height:100px}

/* ANIMACIONES DE ESTADO */
.scan-line{position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,245,255,0.1),transparent);height:20%;animation:scan 3s linear infinite;pointer-events:none}
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(500%)}}
.glitch{animation:glitch 0.3s}@keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(-2px,-2px)}60%{transform:translate(2px,2px)}80%{transform:translate(2px,-2px)}100%{transform:translate(0)}}

/* RANKING EN VIVO */
.live-ranking{position:fixed;bottom:20px;left:20px;right:20px;background:rgba(0,0,0,0.8);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:12px;z-index:50;transform:translateY(120%);transition:transform 0.3s}
.live-ranking.visible{transform:translateY(0)}
.rank-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.rank-item:last-child{border-bottom:none}
.rank-pos{font-family:'Orbitron';font-weight:900;width:24px;text-align:center;color:var(--gold)}
.rank-name{flex:1;font-weight:600}
.rank-score{font-family:'Orbitron';color:var(--accent2)}

/* EFECTOS DE COMBO */
.combo-display{position:fixed;top:80px;right:20px;font-family:'Orbitron';font-size:2rem;font-weight:900;color:var(--gold);text-shadow:0 0 20px var(--gold);opacity:0;transform:scale(0.5);transition:all 0.3s;pointer-events:none;z-index:200}
.combo-display.show{opacity:1;transform:scale(1)}
.combo-text{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px}

/* JOIN SCREEN MEJORADA */
.join-hero{text-align:center;margin-bottom:30px;animation:heroFloat 3s ease-in-out infinite}
@keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.join-title{font-family:'Orbitron';font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.join-subtitle{color:rgba(255,255,255,0.5);font-size:0.9rem;letter-spacing:3px;text-transform:uppercase}

/* EMOJI SELECTOR MEJORADO */
.emoji-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0}
.emoji-btn{font-size:2rem;padding:8px;background:rgba(255,255,255,0.05);border:2px solid transparent;border-radius:12px;cursor:pointer;transition:all 0.2s}
.emoji-btn.selected{border-color:var(--accent);background:rgba(255,107,0,0.2);transform:scale(1.1);box-shadow:0 0 15px rgba(255,107,0,0.3)}
.emoji-btn:active{transform:scale(0.9)}

/* WAITING ANIMATION */
.waiting-pulse{width:80px;height:80px;border-radius:50%;background:var(--accent);margin:0 auto 20px;animation:waitingPulse 2s infinite;position:relative}
.waiting-pulse::after{content:'';position:absolute;inset:-10px;border:2px solid var(--accent);border-radius:50%;animation:waitingRipple 2s infinite}
@keyframes waitingPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(0.9);opacity:0.7}}
@keyframes waitingRipple{0%{transform:scale(0.8);opacity:1}100%{transform:scale(1.5);opacity:0}}

/* WINNER SCREEN ESPECTACULAR */
.winner-bg{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a0d00 0%,#000 70%);z-index:0}
.winner-content{position:relative;z-index:1;text-align:center;padding:40px 20px}
.winner-trophy{font-size:5rem;margin-bottom:20px;animation:trophyBounce 1s ease-in-out infinite}
@keyframes trophyBounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-20px) rotate(5deg)}}

/* MINIJUEGOS ESPECIFICOS */
.simon-game{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:280px;margin:0 auto}
.simon-btn{aspect-ratio:1;border-radius:16px;border:none;cursor:pointer;transition:all 0.1s;position:relative;overflow:hidden}
.simon-btn.red{background:rgba(255,68,68,0.3);border:2px solid #ff4444}
.simon-btn.blue{background:rgba(0,245,255,0.3);border:2px solid #00f5ff}
.simon-btn.green{background:rgba(0,255,136,0.3);border:2px solid #00ff88}
.simon-btn.yellow{background:rgba(255,215,0,0.3);border:2px solid #ffd700}
.simon-btn.active{transform:scale(0.95);filter:brightness(1.5);box-shadow:0 0 30px currentColor}

.sequence-game{display:flex;gap:8px;justify-content:center;margin:20px 0}
.seq-slot{width:50px;height:50px;border:2px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:rgba(0,0,0,0.3)}

/* CONFETTI */
.confetti-container{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1000}
.confetti{position:absolute;width:10px;height:10px;background:var(--gold);animation:confettiFall 3s linear infinite}

/* UTILIDADES */
.hidden{display:none}.text-center{text-align:center}.w-full{width:100%}
.mt-4{margin-top:16px}.mb-4{margin-bottom:16px}.flex{ display:flex}.justify-between{justify-content:space-between}.items-center{align-items:center}
</style>
</head>

<div id="particles"></div>

<!-- HEADER DINAMICO -->
<div class="dynamic-header" id="mainHeader">

</div>

</div>

  </div>
</div>

<!-- SCREEN WAITING -->
<div class="screen" id="s-wait" style="justify-content:center;align-items:center;text-align:center">
  <div class="waiting-pulse"></div>
  <h2 style="font-family:'Orbitron';margin-bottom:10px;color:var(--accent2)">EQUIP REGISTRAT</h2>
  <p style="color:rgba(255,255,255,0.5);margin-bottom:20px">Esperant que el professor iniciï el joc...</p>
  <div class="glass-card" style="display:inline-block;width:auto">
    <div style="font-size:0.7rem;color:rgba(255,255,255,0.3);margin-bottom:4px">CODI DE SALA</div>
    <div id="wCode" style="font-family:'Orbitron';font-size:1.5rem;color:var(--accent);letter-spacing:4px">----</div>
  </div>
  <div id="wTeam" style="margin-top:20px;font-size:1.2rem;font-weight:600"></div>
</div>

<!-- SCREEN GAME -->

  <div style="height:70px"></div> <!-- Spacer for header -->
  
  <div class="phase-tracker" id="phaseTracker"></div>
  
  <div class="lives-container" id="livesBar" style="justify-content:center;margin-bottom:16px"></div>
  
  <div class="glass-card" id="narrativeCard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:0.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:2px" id="phaseName">FASE 1</div>
      <div style="font-size:0.7rem;color:var(--gold)" id="phasePoints">+100 pts</div>
    </div>
    <div class="narrative-box" id="narrativeText">
      Carregant narrativa...
    </div>
  </div>
  
  <!-- ZONA DE MINIJUEGO INTERACTIVO -->
  <div class="game-stage" id="gameStage">
    <div class="scan-line"></div>
    <div id="minigameContainer"></div>
  </div>
  
  <!-- INPUT TRADICIONAL (para puzzles de texto) -->
  <div class="glass-card" id="answerCard">
    <div style="font-size:0.8rem;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">🔐 Resol l'enigma</div>
    <div id="enigmaText" style="font-size:1.1rem;margin-bottom:16px;line-height:1.5;color:#e0e0e0"></div>

    <button class="action-btn mt-4" onclick="submitAnswer()" id="submitBtn" style="padding:14px">ENVIAR</button>
  </div>
  
  <!-- HINT -->
  <div class="hint-container" id="hintBox" onclick="revealHint()">
    <div style="display:flex;align-items:center">
      <span class="hint-icon">💡</span>
      <div>
        <div style="font-size:0.8rem;color:var(--gold);font-weight:600">Pista disponible</div>
        <div class="hint-text" id="hintText"></div>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN WINNER -->
<div class="screen" id="s-win">

  <div class="confetti-container" id="confettiC"></div>

    <div class="winner-trophy">🏆</div>

</div>

  <div id="rankContent"></div>
</div>

    btn.onclick=()=>{
      selectedEmoji=e;
      document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    grid.appendChild(btn);
  });
}
initEmojis();

// AUDIO
let audioCtx=null;
function playSound(type){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  const t=audioCtx.currentTime;
  
  if(type==='success'){
    osc.type='sine';osc.frequency.setValueAtTime(523,t);
    osc.frequency.exponentialRampToValueAtTime(1047,t+0.1);
    gain.gain.setValueAtTime(0.3,t);gain.gain.exponentialRampToValueAtTime(0.01,t+0.5);
    osc.start(t);osc.stop(t+0.5);
  }else if(type==='error'){
    osc.type='sawtooth';osc.frequency.setValueAtTime(200,t);
    osc.frequency.linearRampToValueAtTime(100,t+0.3);
    gain.gain.setValueAtTime(0.3,t);gain.gain.exponentialRampToValueAtTime(0.01,t+0.3);
    osc.start(t);osc.stop(t+0.3);
  }else if(type==='click'){
    osc.type='square';osc.frequency.setValueAtTime(800,t);
    gain.gain.setValueAtTime(0.1,t);gain.gain.exponentialRampToValueAtTime(0.01,t+0.1);
    osc.start(t);osc.stop(t+0.1);
  }
}

// NAVEGACION
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// JOIN
function joinRoom(){
  const code=document.getElementById('codeInp').value.trim().toUpperCase();
  const name=document.getElementById('nameInp').value.trim();
  const members=document.getElementById('membersInp').value.trim();
  
  if(!code||!name){showError('Completa tots els camps');return;}
  
  myRoomCode=code;myTeamId='team_'+Date.now();
  myTeam={id:myTeamId,name,members,emoji:selectedEmoji,score:0};
  
  db.ref(`rooms/${code}/teams/${myTeamId}`).set(myTeam);
  db.ref(`rooms/${code}/scores/${myTeamId}`).set({name,emoji:selectedEmoji,score:0});
  
  document.getElementById('wCode').textContent=code;
  document.getElementById('wTeam').textContent=`${selectedEmoji} ${name}`;
  playSound('click');
  showScreen('s-wait');
  startListening();
}

function showError(msg){
  const el=document.getElementById('errMsg');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

// FIREBASE LISTENERS
function startListening(){
  phaseRef=db.ref(`rooms/${myRoomCode}/phase`);
  phaseRef.on('value',snap=>{
    const data=snap.val();
    if(!data)return;
    if(data.phase!==currentPhase){
      currentPhase=data.phase;
      currentPhaseData=data;
      totalPhases=data.totalPhases||3;
      answerSubmitted=false;hintRevealed=false;combo=0;
      updateCombo();
      enterPhase(data);
    }
  });
  
  timerRef=db.ref(`rooms/${myRoomCode}/timer`);
  timerRef.on('value',snap=>{
    const t=snap.val();if(t==null)return;
    const m=Math.floor(t/60),s=t%60;
    const el=document.getElementById('timerDisplay');
    el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.classList.toggle('timer-critical',t<120);
  });
  
  scoresRef=db.ref(`rooms/${myRoomCode}/scores`);
  scoresRef.on('value',snap=>{
    updateRanking(snap.val()||{});
  });
  
  winnerRef=db.ref(`rooms/${myRoomCode}/winner`);
  winnerRef.on('value',snap=>{
    if(snap.val())showWinner(snap.val());
  });
}

// ENTRAR EN FASE
function enterPhase(data){
  currentPhaseData=data;
  
  // Actualizar header
  document.getElementById('headerPhase').textContent=`${T[lang].phase} ${data.phase+1} ${T[lang].of} ${totalPhases}`;
  document.getElementById('headerStory').textContent=data.storyTitle||'ESCAPE';
  document.getElementById('headerEmoji').textContent=data.storyEmoji||'⚡';
  
  // Actualizar tracker
  const tracker=document.getElementById('phaseTracker');
  tracker.innerHTML='';
  for(let i=0;i<totalPhases;i++){
    const dot=document.createElement('div');
    dot.className='phase-dot'+(i===data.phase?' active':i<data.phase?' completed':'');
    tracker.appendChild(dot);
  }
  
  // Vidas
  myLives=data.lives||3;
  updateLives();
  
  // Narrativa
  document.getElementById('phaseName').textContent=data.phaseName?.[lang]||'FASE';
  document.getElementById('phasePoints').textContent=`+${data.points||100} ${T[lang].points}`;
  document.getElementById('narrativeText').textContent=data.narrativeText?.[lang]||'';
  document.getElementById('enigmaText').textContent=data.enigma?.[lang]||'';
  
  // Hint
  document.getElementById('hintBox').classList.remove('revealed');
  document.getElementById('hintText').textContent=data.hint?.[lang]||'';
  
  // Minijuego
  const stage=document.getElementById('gameStage');
  const container=document.getElementById('minigameContainer');
  container.innerHTML='';
  
  if(data.minigame){
    stage.classList.add('active');
    activeMinigame=data.minigame;
    renderMinigame(data.minigame,data);
  }else if(data.visual){
    stage.classList.add('active');
    container.innerHTML=window.MINIGAMES[data.visual.type](data.visual.config);
  }else{
    stage.classList.remove('active');
  }
  
  // Reset input
  const inp=document.getElementById('ansInp');
  inp.value='';inp.className='terminal-input';inp.disabled=false;
  document.getElementById('submitBtn').disabled=false;
  
  playSound('click');
  showScreen('s-game');
  
  // Auto narrar
  setTimeout(()=>{
    if(data.narrativeText?.[lang]){
      speak(data.narrativeText[lang]+'. '+data.enigma?.[lang]);
    }
  },1000);
}

function updateLives(){
  const bar=document.getElementById('livesBar');
  bar.innerHTML='';
  const maxLives=currentPhaseData?.lives||3;
  for(let i=0;i<maxLives;i++){
    const heart=document.createElement('span');
    heart.className='life-heart'+(i<myLives?'':' lost');
    heart.textContent=i<myLives?'❤️':'🖤';
    bar.appendChild(heart);
  }
}

function updateRanking(scores){
  const arr=Object.entries(scores).sort((a,b)=>b[1].score-a[1].score);
  const content=document.getElementById('rankContent');
  content.innerHTML=arr.slice(0,3).map(([id,d],i)=>{
    const isMe=id===myTeamId;
    return`<div class="rank-item" style="${isMe?'background:rgba(255,107,0,0.2);border-radius:6px;padding:4px':''}">
      <div class="rank-pos">${['🥇','🥈','🥉'][i]||i+1}</div>
      <div class="rank-name">${isMe?'👤 ':''}${d.emoji} ${d.name}</div>
      <div class="rank-score">${d.score}</div>
    </div>`;
  }).join('');
  document.getElementById('liveRanking').classList.add('visible');
}

function revealHint(){
  document.getElementById('hintBox').classList.add('revealed');
  if(currentPhaseData){
    db.ref(`rooms/${myRoomCode}/hints/${myTeamId}`).push({
      phase:currentPhase,ts:Date.now()
    });
  }
}

// SISTEMA DE MINIJUEGOS INTERACTIVOS
function renderMinigame(type,data){
  const container=document.getElementById('minigameContainer');
  
  if(type==='simon'){
    // Simon Says
    container.innerHTML=`<div class="simon-game">
      <button class="simon-btn red" onclick="simonClick(0)"></button>
      <button class="simon-btn blue" onclick="simonClick(1)"></button>
      <button class="simon-btn green" onclick="simonClick(2)"></button>
      <button class="simon-btn yellow" onclick="simonClick(3)"></button>
    </div>
    <div style="margin-top:16px;text-align:center">
      <button class="action-btn" onclick="startSimon()" id="startSimonBtn" style="padding:10px 20px;font-size:0.8rem">COMENÇAR</button>
    </div>`;
    window.simonSequence=[];window.simonIndex=0;window.simonPlayerTurn=false;
    
  }else if(type==='sequence'){
    // Secuencia de símbolos
    const symbols=['⚡','🔥','💧','🌿'];
    const seq=data.sequence||[0,2,1];
    window.targetSequence=seq;
    window.playerSequence=[];
    
    container.innerHTML=`<div style="text-align:center;margin-bottom:16px">
      <div style="font-size:0.8rem;color:var(--accent2);margin-bottom:8px">REPETEIX LA SEQÜÈNCIA</div>
      <div class="sequence-game" id="seqDisplay"></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:200px;margin:0 auto">
      ${symbols.map((s,i)=>`<button onclick="addToSequence(${i})" style="font-size:2rem;padding:15px;background:rgba(255,255,255,0.1);border:2px solid var(--border);border-radius:12px;cursor:pointer">${s}</button>`).join('')}
    </div>
    <button class="action-btn mt-4" onclick="checkSequence()" style="padding:10px">VERIFICAR</button>`;
    
    // Mostrar secuencia objetivo animada
    setTimeout(()=>showTargetSequence(symbols,seq),500);
    
  }else if(type==='cipher'){
    // Cifrado César interactivo
    const shift=data.shift||3;
    container.innerHTML=`<div style="text-align:center">
      <div style="font-size:0.8rem;color:var(--accent2);margin-bottom:16px">DESPLAÇAMENT: +${shift}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px" id="cipherSlots"></div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;max-width:280px;margin:0 auto">
        ${'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l=>`<button onclick="addCipherLetter('${l}')" style="padding:8px;background:rgba(255,255,255,0.1);border:1px solid var(--border);border-radius:6px;color:#fff;font-family:monospace;cursor:pointer">${l}</button>`).join('')}
      </div>
      <button onclick="clearCipher()" style="margin-top:10px;background:transparent;border:1px solid var(--border);color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer">ESBORRAR</button>
    </div>`;
    window.cipherAnswer='';window.cipherTarget=data.answer||'CODE';
  }
}

// LOGICA SIMON SAYS
function startSimon(){
  document.getElementById('startSimonBtn').style.display='none';
  window.simonSequence=[0,2,1,3,2]; // Secuencia fija por simplicidad, podría ser aleatoria
  playSequence();
}

function playSequence(){
  window.simonPlayerTurn=false;
  let i=0;
  const interval=setInterval(()=>{
    if(i>=window.simonSequence.length){
      clearInterval(interval);
      window.simonPlayerTurn=true;
      return;
    }
    flashButton(window.simonSequence[i]);
    i++;
  },800);
}

function flashButton(idx){
  const btns=document.querySelectorAll('.simon-btn');
  btns[idx].classList.add('active');
  setTimeout(()=>btns[idx].classList.remove('active'),400);
}

function simonClick(idx){
  if(!window.simonPlayerTurn)return;
  flashButton(idx);
  if(idx!==window.simonSequence[window.simonIndex]){
    // Error - pierde vida pero continúa
    loseLife();
    window.simonIndex=0;
    document.getElementById('startSimonBtn').style.display='inline-block';
    document.getElementById('startSimonBtn').textContent='REINTENTAR';
    return;
  }
  window.simonIndex++;
  if(window.simonIndex>=window.simonSequence.length){
    // Completado correctamente
    document.getElementById('ansInp').value=currentPhaseData.answer||'SIMON';
    submitAnswer();
  }
}

// LOGICA SECUENCIA
function showTargetSequence(symbols,seq){
  const display=document.getElementById('seqDisplay');
  let i=0;
  const interval=setInterval(()=>{
    if(i>=seq.length){clearInterval(interval);display.innerHTML='';return;}
    display.innerHTML=`<div style="font-size:2rem;animation:pop 0.3s">${symbols[seq[i]]}</div>`;
    i++;
  },800);
}

function addToSequence(idx){
  window.playerSequence.push(idx);
  updateSequenceDisplay();
}

function updateSequenceDisplay(){
  const disp=document.getElementById('seqDisplay');
  disp.innerHTML=window.playerSequence.map(i=>`<div class="seq-slot">${['⚡','🔥','💧','🌿'][i]}</div>`).join('');
}

function checkSequence(){
  const correct=JSON.stringify(window.playerSequence)===JSON.stringify(window.targetSequence);
  if(correct){
    document.getElementById('ansInp').value=currentPhaseData.answer||'SEQUENCE';
    submitAnswer();
  }else{
    loseLife();
    window.playerSequence=[];
    updateSequenceDisplay();
    playSound('error');
  }
}

// CIFRADO
function addCipherLetter(l){
  if(window.cipherAnswer.length<10){
    window.cipherAnswer+=l;
    document.getElementById('cipherSlots').innerHTML=window.cipherAnswer.split('').map(l=>`<span style="padding:8px 12px;background:rgba(255,107,0,0.2);border:1px solid var(--accent);border-radius:6px;font-family:monospace">${l}</span>`).join('');
  }
}

function clearCipher(){
  window.cipherAnswer='';
  document.getElementById('cipherSlots').innerHTML='';
}

// SUBMIT ANSWER
function submitAnswer(){
  if(answerSubmitted||!currentPhaseData)return;
  const ans=activeMinigame?document.getElementById('ansInp').value:(document.getElementById('ansInp').value.trim().toUpperCase());
  if(!ans)return;
  
  const correct=ans===(currentPhaseData.answer||'').toUpperCase()||currentPhaseData.answer==='VARIABLE';
  const pts=correct?(currentPhaseData.points||100):0;
  
  // Feedback visual
  const inp=document.getElementById('ansInp');
  if(correct){
    inp.classList.add('success');
    combo++;updateCombo();playSound('success');
    if(navigator.vibrate)navigator.vibrate([50,50,50]);
  }else{
    inp.classList.add('error');playSound('error');
    loseLife();
    if(navigator.vibrate)navigator.vibrate(200);
    setTimeout(()=>inp.classList.remove('error'),1000);
  }
  
  if(correct){
    myScore+=pts;
    db.ref(`rooms/${myRoomCode}/scores/${myTeamId}`).transaction(s=>({...(s||{}),score:myScore}));
    db.ref(`rooms/${myRoomCode}/answers`).push({
      teamId:myTeamId,teamName:myTeam.name,emoji:myTeam.emoji,
      answer:ans,correct:true,pts,phase:currentPhase,ts:Date.now()
    });
    answerSubmitted=true;inp.disabled=true;document.getElementById('submitBtn').disabled=true;
  }
}

function loseLife(){
  myLives--;
  updateLives();
  const hearts=document.querySelectorAll('.life-heart');
  if(hearts[myLives])hearts[myLives].classList.add('damaged');
  if(myLives<=0){
    // Game over para este equipo
    db.ref(`rooms/${myRoomCode}/eliminated/${myTeamId}`).set(true);
  }
}

function updateCombo(){
  const el=document.getElementById('comboDisplay');
  const count=document.getElementById('comboCount');
  if(combo>1){
    count.textContent='x'+combo;el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),2000);
  }
}

// SPEECH
function speak(text){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='ca'?'ca-ES':'es-ES';
  u.rate=0.9;u.pitch=0.9;u.volume=1;
  speechSynthesis.speak(u);
}

// WINNER
function showWinner(w){
  document.getElementById('winName').textContent=w.name?`${w.emoji} ${w.name}`:'TOTS ELS EQUIP';
  document.getElementById('winScore').textContent=myScore;
  
  // Confetti
  const c=document.getElementById('confettiC');
  for(let i=0;i<50;i++){
    const p=document.createElement('div');p.className='confetti';
    p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*3+'s';
    p.style.background=`hsl(${Math.random()*360},100%,50%)`;
    c.appendChild(p);
  }
  
  showScreen('s-win');
  speak(lang==='ca'?"Enhorabona! Heu completat l'aventura!":"¡Enhorabuena! ¡Habéis completado la aventura!");
}

function resetGame(){
  location.reload();
}

// HEADER SCROLL
document.getElementById('s-game')?.addEventListener('scroll',(e)=>{
  const header=document.getElementById('mainHeader');
  if(e.target.scrollTop>50)header.classList.add('header-scrolled');
  else header.classList.remove('header-scrolled');
});
</script>
