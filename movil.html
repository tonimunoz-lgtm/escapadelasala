<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ESCAPE CLASS — Móvil</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;600;700&family=Exo+2:wght@300;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ff6b00;
    --accent2: #00f5ff;
    --bg: #0a0a0f;
    --card: rgba(255,255,255,0.05);
    --text: #f0e6d3;
    --success: #00ff88;
    --error: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.8s;
  }

  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ═══════ LANG SWITCH ═══════ */
  .lang-switch {
    position: fixed; top: 12px; right: 12px; z-index: 9999;
    display: flex; gap: 4px;
  }
  .lang-btn {
    background: rgba(255,255,255,0.08); border: 1px solid var(--accent);
    color: var(--text); padding: 4px 10px; border-radius: 20px;
    font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: 12px; cursor: pointer; transition: all 0.3s;
  }
  .lang-btn.active { background: var(--accent); color: #000; }

  /* ═══════ JOIN SCREEN ═══════ */
  #screen-join {
    justify-content: center; align-items: center; padding: 24px;
    background: radial-gradient(ellipse at center, #1a0a2e, #0a0a0f);
    position: relative; overflow: hidden;
  }

  .join-stars {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 20%, rgba(0,245,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 70%, rgba(255,107,0,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 55% 40%, rgba(255,255,255,0.6) 0%, transparent 100%);
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.5; } to { opacity: 1; } }

  .join-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 380px;
    backdrop-filter: blur(20px); z-index: 1; text-align: center;
  }

  .logo-mini {
    font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900;
    background: linear-gradient(135deg, #ff6b00, #00f5ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 4px;
  }
  .logo-sub-mini {
    font-size: 0.7rem; letter-spacing: 3px; color: rgba(255,255,255,0.3);
    text-transform: uppercase; margin-bottom: 28px;
  }

  .input-group { margin-bottom: 16px; text-align: left; }
  .input-label {
    font-size: 0.7rem; letter-spacing: 2px; color: var(--accent2);
    text-transform: uppercase; margin-bottom: 6px; display: block;
  }
  .input-field {
    width: 100%; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
    padding: 14px 16px; color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600;
    outline: none; transition: all 0.3s;
    -webkit-appearance: none;
  }
  .input-field:focus { border-color: var(--accent); background: rgba(255,107,0,0.05); }
  .input-field::placeholder { color: rgba(255,255,255,0.2); }

  .code-field {
    font-family: 'Orbitron', sans-serif; font-size: 1.6rem;
    text-align: center; letter-spacing: 8px; text-transform: uppercase;
  }

  .emoji-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 12px 0;
  }
  .emoji-option {
    font-size: 1.6rem; padding: 8px; border-radius: 10px; cursor: pointer;
    background: rgba(255,255,255,0.04); border: 2px solid transparent;
    transition: all 0.2s; text-align: center;
  }
  .emoji-option.selected { border-color: var(--accent); background: rgba(255,107,0,0.15); }

  .join-btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 900;
    letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), #ff0080);
    color: white; transition: all 0.3s; margin-top: 8px;
  }
  .join-btn:active { transform: scale(0.97); }
  .join-btn:disabled { opacity: 0.4; }

  .error-msg {
    color: var(--error); font-size: 0.85rem; margin-top: 8px;
    padding: 8px 12px; background: rgba(255,68,68,0.1); border-radius: 8px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* ═══════ WAITING SCREEN ═══════ */
  #screen-waiting {
    justify-content: center; align-items: center; padding: 24px;
    background: radial-gradient(ellipse at center, #1a0a2e, #0a0a0f);
    text-align: center;
  }

  .waiting-emoji { font-size: 4rem; animation: waitingBounce 2s ease-in-out infinite; }
  @keyframes waitingBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .waiting-title {
    font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900;
    margin: 16px 0 8px; color: var(--accent2);
  }
  .team-display {
    font-size: 1.2rem; font-weight: 700; margin-bottom: 24px;
    background: rgba(255,255,255,0.05); padding: 12px 24px; border-radius: 12px;
  }

  .pulse-dots { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

  .room-badge {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 12px 20px; margin-top: 16px;
  }
  .room-badge-label { font-size: 0.65rem; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
  .room-badge-code { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; color: var(--accent); letter-spacing: 4px; }

  /* ═══════ GAME SCREEN ═══════ */
  #screen-game {
    padding: 16px;
    background: var(--bg);
    transition: background 0.8s;
  }

  .game-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .score-display {
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.1rem;
    color: var(--accent2);
  }
  .score-label { font-size: 0.6rem; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-transform: uppercase; }

  .phase-display {
    text-align: center;
    font-size: 0.65rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase;
  }

  .timer-mini {
    font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700;
    text-align: right;
  }
  .timer-mini.urgent { color: var(--error); animation: timerShake 0.5s ease-in-out infinite; }
  @keyframes timerShake { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  .story-header {
    background: rgba(255,255,255,0.03); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 14px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  .phase-name-mobile { font-size: 0.65rem; letter-spacing: 3px; color: var(--accent2); text-transform: uppercase; margin-bottom: 4px; }
  .narrative-title-mobile { font-size: 1.05rem; font-weight: 700; line-height: 1.2; }

  .narrative-text-mobile {
    background: rgba(255,255,255,0.03); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 14px;
    font-size: 0.9rem; line-height: 1.6; color: rgba(240,230,211,0.8);
    border: 1px solid rgba(255,255,255,0.07);
    max-height: 150px; overflow-y: auto;
  }

  .enigma-card {
    background: rgba(255,107,0,0.06); border: 1px solid rgba(255,107,0,0.25);
    border-radius: 14px; padding: 16px; margin-bottom: 14px;
  }
  .enigma-label-mobile {
    font-size: 0.65rem; letter-spacing: 2px; color: var(--accent);
    text-transform: uppercase; margin-bottom: 8px; display: block;
  }
  .enigma-text-mobile { font-size: 0.95rem; font-weight: 600; line-height: 1.5; }

  .answer-section { margin-bottom: 14px; }

  .answer-input {
    width: 100%; background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15); border-radius: 14px;
    padding: 16px; color: var(--text);
    font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700;
    outline: none; transition: all 0.3s; text-align: center;
    -webkit-appearance: none; letter-spacing: 2px;
    text-transform: uppercase;
  }
  .answer-input:focus { border-color: var(--accent); background: rgba(255,107,0,0.06); }
  .answer-input.correct { border-color: var(--success); background: rgba(0,255,136,0.06); }
  .answer-input.wrong { border-color: var(--error); background: rgba(255,68,68,0.06); animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .submit-btn {
    width: 100%; padding: 18px; border-radius: 14px; border: none;
    font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900;
    letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), #ff0080);
    color: white; transition: all 0.3s; margin-top: 10px;
    position: relative; overflow: hidden;
  }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.5; }
  .submit-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%); animation: shimmer 2s infinite;
  }
  @keyframes shimmer { to { transform: translateX(100%); } }

  .feedback-card {
    border-radius: 14px; padding: 16px; text-align: center;
    margin-bottom: 14px; display: none;
    animation: feedbackIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes feedbackIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .feedback-card.show { display: block; }
  .feedback-card.correct { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); }
  .feedback-card.wrong { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); }
  .feedback-emoji { font-size: 2.5rem; margin-bottom: 8px; }
  .feedback-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900; margin-bottom: 4px; }
  .feedback-pts { font-size: 0.85rem; color: var(--accent2); }

  .hint-section {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; transition: all 0.3s;
  }
  .hint-section:active { background: rgba(255,255,255,0.07); }
  .hint-text { font-size: 0.85rem; color: rgba(255,255,255,0.4); font-style: italic; transition: color 0.3s; }
  .hint-icon { font-size: 1.2rem; }

  .ranking-mini {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px; padding: 14px; margin-bottom: 14px;
  }
  .ranking-mini-title {
    font-size: 0.65rem; letter-spacing: 2px; color: var(--accent);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .rank-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.85rem;
  }
  .rank-pos { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; width: 24px; font-weight: 700; }
  .rank-me { background: rgba(255,107,0,0.1); border-radius: 6px; padding: 2px 6px; }

  /* ═══════ WINNER SCREEN ═══════ */
  #screen-winner {
    justify-content: center; align-items: center; padding: 24px;
    text-align: center;
    background: radial-gradient(ellipse at center, #1a0d00, #0a0a0f);
    overflow: hidden; position: relative;
  }

  .winner-content { z-index: 1; }
  .winner-crown-mobile { font-size: 4rem; animation: crownBounce 1s ease-in-out infinite; }
  @keyframes crownBounce { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-10px) rotate(5deg); } }

  .winner-label-mobile {
    font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
    letter-spacing: 4px; color: var(--accent2); margin: 12px 0 6px;
    text-transform: uppercase;
  }
  .winner-name-mobile {
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.5rem;
    background: linear-gradient(135deg, #FFD700, #ff6b00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 6px;
  }
  .your-score {
    background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.3);
    border-radius: 12px; padding: 16px; margin: 20px 0;
  }
  .your-score-label { font-size: 0.65rem; letter-spacing: 2px; color: var(--accent2); text-transform: uppercase; margin-bottom: 4px; }
  .your-score-val { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; color: var(--accent); }

  .play-again-btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 900;
    letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), #ff0080);
    color: white; margin-top: 16px;
  }

  /* confetti mobile */
  .confetti-m { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .c-piece {
    position: absolute; width: 8px; height: 8px;
    animation: cFall linear infinite;
  }
  @keyframes cFall {
    0% { transform: translateY(-60px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
</style>
</head>
<body>

<div class="lang-switch">
  <button class="lang-btn active" onclick="setLang('es')" id="btn-es">ES</button>
  <button class="lang-btn" onclick="setLang('ca')" id="btn-ca">CA</button>
</div>

<!-- ═══════ JOIN SCREEN ═══════ -->
<div class="screen active" id="screen-join">
  <div class="join-stars"></div>
  <div class="join-card">
    <div class="logo-mini">ESCAPE CLASS</div>
    <div class="logo-sub-mini" data-i18n="join_sub">Únete a la aventura</div>

    <div class="input-group">
      <label class="input-label" data-i18n="room_code_label">CÓDIGO DE SALA</label>
      <input class="input-field code-field" id="codeInput" type="text" maxlength="4"
        placeholder="XXXX" autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="this.value=this.value.toUpperCase()">
    </div>

    <div class="input-group">
      <label class="input-label" data-i18n="team_name_label">NOMBRE DEL EQUIPO</label>
      <input class="input-field" id="teamNameInput" type="text" maxlength="20"
        placeholder="Los Exterminadores" autocomplete="off">
    </div>

    <div class="input-group">
      <label class="input-label" data-i18n="members_label">MIEMBROS (separados por coma)</label>
      <input class="input-field" id="membersInput" type="text" maxlength="60"
        placeholder="Ana, Carlos, Sofía" autocomplete="off">
    </div>

    <div class="input-group">
      <label class="input-label" data-i18n="emoji_label">EMOJI DEL EQUIPO</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="join-btn" onclick="joinRoom()" id="joinBtn" data-i18n="join_btn">
      ⚡ UNIRSE A LA AVENTURA
    </button>
  </div>
</div>

<!-- ═══════ WAITING SCREEN ═══════ -->
<div class="screen" id="screen-waiting">
  <div class="waiting-emoji" id="waitingEmoji">⚡</div>
  <div class="waiting-title" data-i18n="waiting_title">¡EQUIPO REGISTRADO!</div>
  <div class="team-display" id="teamDisplay"></div>
  <div style="font-size:0.9rem; color:rgba(255,255,255,0.4); margin-bottom:20px;" data-i18n="waiting_game">
    Esperando que el profesor inicie el juego...
  </div>
  <div class="pulse-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="room-badge">
    <div class="room-badge-label" data-i18n="your_room">TU SALA</div>
    <div class="room-badge-code" id="waitingRoomCode">----</div>
  </div>
</div>

<!-- ═══════ GAME SCREEN ═══════ -->
<div class="screen" id="screen-game">
  <div class="game-top">
    <div>
      <div class="score-label" data-i18n="score_label">PUNTOS</div>
      <div class="score-display" id="myScore">0</div>
    </div>
    <div>
      <div class="phase-display" id="phaseDisplay"></div>
    </div>
    <div>
      <div class="score-label" style="text-align:right;" data-i18n="time_label">TIEMPO</div>
      <div class="timer-mini" id="timerMini">--:--</div>
    </div>
  </div>

  <div class="story-header">
    <div class="phase-name-mobile" id="phaseNameMobile"></div>
    <div class="narrative-title-mobile" id="narrativeTitleMobile"></div>
  </div>

  <div class="narrative-text-mobile" id="narrativeTextMobile"></div>

  <div class="enigma-card">
    <span class="enigma-label-mobile" data-i18n="enigma_label">🔐 ENIGMA</span>
    <div class="enigma-text-mobile" id="enigmaTextMobile"></div>
  </div>

  <div class="feedback-card" id="feedbackCard">
    <div class="feedback-emoji" id="feedbackEmoji"></div>
    <div class="feedback-title" id="feedbackTitle"></div>
    <div class="feedback-pts" id="feedbackPts"></div>
  </div>

  <div class="answer-section" id="answerSection">
    <input class="answer-input" id="answerInput" type="text"
      placeholder="TU RESPUESTA" autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="this.value=this.value.toUpperCase()"
      onkeypress="if(event.key==='Enter') submitAnswer()">
    <button class="submit-btn" onclick="submitAnswer()" id="submitBtn" data-i18n="submit_btn">
      ENVIAR RESPUESTA
    </button>
  </div>

  <div class="hint-section" id="hintSection" onclick="toggleHint()">
    <span>💡</span>
    <span class="hint-text" id="hintText" data-i18n="hint_tap">Toca para ver la pista</span>
    <span class="hint-icon">›</span>
  </div>

  <div class="ranking-mini">
    <div class="ranking-mini-title" data-i18n="ranking_mini">🏆 RANKING</div>
    <div id="rankingMini"></div>
  </div>
</div>

<!-- ═══════ WINNER SCREEN ═══════ -->
<div class="screen" id="screen-winner">
  <div class="confetti-m" id="confettiM"></div>
  <div class="winner-content">
    <div class="winner-crown-mobile">🏆</div>
    <div class="winner-label-mobile" data-i18n="winner_label">¡FIN DE LA AVENTURA!</div>
    <div class="winner-name-mobile" id="winnerNameMobile"></div>
    <div class="your-score">
      <div class="your-score-label" data-i18n="your_score">TU PUNTUACIÓN</div>
      <div class="your-score-val" id="yourFinalScore">0</div>
    </div>
    <div id="rankingFinal" style="text-align:left;"></div>
    <button class="play-again-btn" onclick="resetAndJoin()" data-i18n="play_again_btn">
      🔄 VOLVER AL INICIO
    </button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// I18N
// ═══════════════════════════════════════════════════
const i18n = {
  es: {
    join_sub: "Únete a la aventura",
    room_code_label: "CÓDIGO DE SALA",
    team_name_label: "NOMBRE DEL EQUIPO",
    members_label: "MIEMBROS (separados por coma)",
    emoji_label: "EMOJI DEL EQUIPO",
    join_btn: "⚡ UNIRSE A LA AVENTURA",
    waiting_title: "¡EQUIPO REGISTRADO!",
    waiting_game: "Esperando que el profesor inicie el juego...",
    your_room: "TU SALA",
    score_label: "PUNTOS",
    time_label: "TIEMPO",
    enigma_label: "🔐 ENIGMA",
    submit_btn: "ENVIAR RESPUESTA",
    hint_tap: "Toca para ver la pista",
    ranking_mini: "🏆 RANKING",
    winner_label: "¡FIN DE LA AVENTURA!",
    your_score: "TU PUNTUACIÓN",
    play_again_btn: "🔄 VOLVER AL INICIO",
    correct_title: "¡CORRECTO!",
    wrong_title: "INCORRECTO",

let currentLang = 'es';
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
  document.getElementById('btn-ca').classList.toggle('active', lang === 'ca');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
}
function t(key) { return i18n[currentLang][key] || key; }

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let myTeam = null;
let myRoomCode = '';
let myScore = 0;
let currentPhaseData = null;
let lastPhaseIndex = -1;
let hintShown = false;
let answerSubmitted = false;
let pollInterval = null;

const EMOJIS = ['⚡','🔥','💥','🌊','🎯','🚀','🦁','🐯','🦊','🐺',
                '🦅','🦋','🌟','💎','🗡️','🛡️','🎭','🏹','🔮','🌙'];

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function initEmojiGrid() {
  const grid = document.getElementById('emojiGrid');
  let selectedEmoji = EMOJIS[0];
  grid.innerHTML = EMOJIS.map(e => `
    <div class="emoji-option ${e === selectedEmoji ? 'selected' : ''}"
         onclick="selectEmoji('${e}', this)">${e}</div>
  `).join('');
  grid.dataset.selected = selectedEmoji;
}

function selectEmoji(emoji, el) {
  document.querySelectorAll('.emoji-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('emojiGrid').dataset.selected = emoji;
}

// Check URL params
function init() {
  const params = new URLSearchParams(window.location.search);
  const sala = params.get('sala');
  if (sala) document.getElementById('codeInput').value = sala.toUpperCase();
  initEmojiGrid();
}

// ═══════════════════════════════════════════════════
// JOIN
// ═══════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function joinRoom() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const name = document.getElementById('teamNameInput').value.trim();
  const members = document.getElementById('membersInput').value.trim();
  const emoji = document.getElementById('emojiGrid').dataset.selected || '⚡';

  if (!code) { showError(t('enter_code')); return; }
  if (!name) { showError(t('fill_all')); return; }

  myTeam = { id: Date.now(), name, members, emoji, code };
  myRoomCode = code;

  // Register team in localStorage
  const key = 'escapeclass_teams_' + code;
  let teams = [];
  try { const raw = localStorage.getItem(key); teams = raw ? JSON.parse(raw) : []; } catch {}
  // Remove if already exists (rejoin)
  teams = teams.filter(t => t.name !== name);
  teams.push(myTeam);
  localStorage.setItem(key, JSON.stringify(teams));

  // Init my score
  const scoreKey = 'escapeclass_scores_' + code;
  let scores = {};
  try { const raw = localStorage.getItem(scoreKey); scores = raw ? JSON.parse(raw) : {}; } catch {}
  if (!scores[myTeam.id]) {
    scores[myTeam.id] = { name, emoji, score: 0 };
    localStorage.setItem(scoreKey, JSON.stringify(scores));
  }

  document.getElementById('waitingEmoji').textContent = emoji;
  document.getElementById('teamDisplay').textContent = `${emoji} ${name}`;
  document.getElementById('waitingRoomCode').textContent = code;

  showScreen('waiting');
  startPolling();
}

// ═══════════════════════════════════════════════════
// POLLING
// ═══════════════════════════════════════════════════
function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(checkGameState, 1500);
}

function checkGameState() {
  try {
    const raw = localStorage.getItem('escapeclass_phase_' + myRoomCode);
    if (!raw) return;
    const phase = JSON.parse(raw);

    // Check if game started
    if (document.getElementById('screen-waiting').classList.contains('active')) {
      enterGame(phase);
      return;
    }

    // Check if phase changed
    if (phase.phase !== lastPhaseIndex) {
      lastPhaseIndex = phase.phase;
      currentPhaseData = phase;
      hintShown = false;
      answerSubmitted = false;
      renderPhase(phase);
    }

    // Update ranking
    renderRankingMini();

    // Check for winner broadcast
    const winnerRaw = localStorage.getItem('escapeclass_winner_' + myRoomCode);
    if (winnerRaw) {
      showWinner(JSON.parse(winnerRaw));
    }
  } catch {}
}

function enterGame(phase) {
  lastPhaseIndex = phase.phase;
  currentPhaseData = phase;
  
  // Set theme color
  document.documentElement.style.setProperty('--accent', phase.storyColor || '#ff6b00');
  document.getElementById('screen-game').style.background = 
    `radial-gradient(ellipse at 30% 30%, ${phase.storyColor}15, #0a0a0f)`;

  renderPhase(phase);
  showScreen('game');
}

function renderPhase(phase) {
  document.getElementById('phaseDisplay').textContent = 
    `${t('phase_label')} ${phase.phase + 1}`;
  document.getElementById('phaseNameMobile').textContent = 
    currentPhaseData?.phaseName || '';
  document.getElementById('narrativeTitleMobile').textContent = '';
  document.getElementById('narrativeTextMobile').textContent = 
    t('loading');
  document.getElementById('enigmaTextMobile').textContent = phase.enigma || '';

  // Reset UI
  const answerInput = document.getElementById('answerInput');
  answerInput.value = '';
  answerInput.className = 'answer-input';
  document.getElementById('answerSection').style.display = 'flex';
  document.getElementById('answerSection').style.flexDirection = 'column';
  document.getElementById('feedbackCard').classList.remove('show', 'correct', 'wrong');
  document.getElementById('hintText').textContent = t('hint_tap');
  hintShown = false;
  answerSubmitted = false;
  document.getElementById('submitBtn').disabled = false;

  // Fetch narrative from projector state
  try {
    const projRaw = localStorage.getItem('escapeclass_gamestate');
    if (projRaw) {
      const gs = JSON.parse(projRaw);
      const story = window._STORIES?.find(s => s.id === gs.currentStory);
      if (story && story.phases[phase.phase]) {
        const p = story.phases[phase.phase];
        document.getElementById('narrativeTitleMobile').textContent = p.narrativeTitle[currentLang];
        document.getElementById('narrativeTextMobile').textContent = p.narrativeText[currentLang];
      }
    }
  } catch {}

  if (!document.getElementById('narrativeTitleMobile').textContent) {
    document.getElementById('narrativeTextMobile').textContent = '';
  }
}

// ═══════════════════════════════════════════════════
// ANSWER
// ═══════════════════════════════════════════════════
function submitAnswer() {
  if (answerSubmitted) { return; }
  const answer = document.getElementById('answerInput').value.trim();
  if (!answer) return;

  const phase = currentPhaseData;
  if (!phase) return;

  const correct = answer.toLowerCase() === phase.answer?.toLowerCase() || phase.answer === 'VARIABLE';
  const pts = correct ? (phase.points || 100) : 0;

  // Show feedback
  const feedbackCard = document.getElementById('feedbackCard');
  feedbackCard.classList.remove('correct', 'wrong');
  feedbackCard.classList.add('show', correct ? 'correct' : 'wrong');
  document.getElementById('feedbackEmoji').textContent = correct ? '🎉' : '❌';
  document.getElementById('feedbackTitle').textContent = correct ? t('correct_title') : t('wrong_title');
  document.getElementById('feedbackPts').textContent = correct ? `+${pts} ${t('pts')}` : '';

  // Animate input
  const input = document.getElementById('answerInput');
  input.className = 'answer-input ' + (correct ? 'correct' : 'wrong');

  if (correct) {
    myScore += pts;
    document.getElementById('myScore').textContent = myScore;
    updateMyScore();
  }

  // Save answer
  const ansKey = 'escapeclass_answers_' + myRoomCode;
  let answers = [];
  try { const raw = localStorage.getItem(ansKey); answers = raw ? JSON.parse(raw) : []; } catch {}
  answers.push({ teamName: myTeam.name, emoji: myTeam.emoji, answer, correct, pts, phase: phase.phase });
  localStorage.setItem(ansKey, JSON.stringify(answers));

  answerSubmitted = true;
  document.getElementById('submitBtn').disabled = true;

  // Vibrate if available
  if (navigator.vibrate) navigator.vibrate(correct ? [100, 50, 100] : [200]);
}

function updateMyScore() {
  try {
    const scoreKey = 'escapeclass_scores_' + myRoomCode;
    let scores = {};
    try { const raw = localStorage.getItem(scoreKey); scores = raw ? JSON.parse(raw) : {}; } catch {}
    if (scores[myTeam.id]) {
      scores[myTeam.id].score = myScore;
    } else {
      scores[myTeam.id] = { name: myTeam.name, emoji: myTeam.emoji, score: myScore };
    }
    localStorage.setItem(scoreKey, JSON.stringify(scores));
  } catch {}
}

function toggleHint() {
  if (!currentPhaseData) return;
  try {
    const projRaw = localStorage.getItem('escapeclass_gamestate');
    if (!projRaw) return;
    const gs = JSON.parse(projRaw);
    const story = window._STORIES?.find(s => s.id === gs.currentStory);
    if (!story) return;
    const phase = story.phases[currentPhaseData.phase];
    if (!phase?.hint) return;
    const hint = phase.hint[currentLang];
    document.getElementById('hintText').textContent = hint || t('hint_tap');
  } catch {
    document.getElementById('hintText').textContent = t('hint_tap');
  }
}

function renderRankingMini() {
  try {
    const raw = localStorage.getItem('escapeclass_scores_' + myRoomCode);
    if (!raw) return;
    const scores = JSON.parse(raw);
    const sorted = Object.entries(scores).sort((a,b) => b[1].score - a[1].score);
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('rankingMini').innerHTML = sorted.slice(0,4).map(([id, data], i) => `
      <div class="rank-item ${id == myTeam?.id ? 'rank-me' : ''}">
        <span class="rank-pos">${medals[i] || i+1}</span>
        <span style="flex:1;">${data.emoji || '⚡'} ${data.name}</span>
        <span style="font-family:'Orbitron',sans-serif; font-size:0.8rem; color:var(--accent2);">${data.score}</span>
      </div>
    `).join('');
  } catch {}
}

// ═══════════════════════════════════════════════════
// WINNER
// ═══════════════════════════════════════════════════
function showWinner(winnerData) {
  if (pollInterval) clearInterval(pollInterval);
  document.getElementById('winnerNameMobile').textContent = winnerData.name || '';
  document.getElementById('yourFinalScore').textContent = `${myScore} ${t('pts')}`;

  try {
    const raw = localStorage.getItem('escapeclass_scores_' + myRoomCode);
    if (raw) {
      const scores = JSON.parse(raw);
      const sorted = Object.entries(scores).sort((a,b) => b[1].score - a[1].score);
      const medals = ['🥇','🥈','🥉'];
      document.getElementById('rankingFinal').innerHTML = `
        <div style="font-size:0.65rem; letter-spacing:2px; color:var(--accent); text-transform:uppercase; margin-bottom:10px;">${t('ranking_mini')}</div>
        ${sorted.slice(0,5).map(([id, data], i) => `
          <div style="display:flex; gap:8px; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.06); font-size:0.9rem; ${id == myTeam?.id ? 'background:rgba(255,107,0,0.08); border-radius:8px; padding:8px;' : ''}">
            <span>${medals[i] || i+1}</span>
            <span style="flex:1;">${data.emoji || '⚡'} ${data.name}</span>
            <span style="font-family:'Orbitron',sans-serif; color:var(--accent2); font-size:0.85rem;">${data.score}</span>
          </div>
        `).join('')}
      `;
    }
  } catch {}

  spawnConfettiMobile();
  showScreen('winner');
}

function spawnConfettiMobile() {
  const container = document.getElementById('confettiM');
  container.innerHTML = '';
  const colors = ['#ff6b00','#00f5ff','#ff0080','#FFD700','#00ff88'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'c-piece';
    p.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${5+Math.random()*8}px; height:${5+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'0'};
      animation-duration:${2+Math.random()*3}s;
      animation-delay:${Math.random()*1.5}s;
    `;
    container.appendChild(p);
  }
}

function resetAndJoin() {
  myTeam = null; myRoomCode = ''; myScore = 0;
  currentPhaseData = null; lastPhaseIndex = -1;
  answerSubmitted = false; hintShown = false;
  if (pollInterval) clearInterval(pollInterval);
  document.getElementById('codeInput').value = '';
  document.getElementById('teamNameInput').value = '';
  document.getElementById('membersInput').value = '';
  showScreen('join');
}

// Timer sync from projector
setInterval(() => {
  try {
    const raw = localStorage.getItem('escapeclass_gamestate');
    if (!raw) return;
    const gs = JSON.parse(raw);
    if (gs.timeLeft !== undefined) {
      const m = Math.floor(gs.timeLeft / 60);
      const s = gs.timeLeft % 60;
      const timerEl = document.getElementById('timerMini');
      timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      timerEl.classList.toggle('urgent', gs.timeLeft < 120);
    }
  } catch {}
}, 2000);

init();
</script>
