<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESCAPE CLASS — Pantalla Proyector</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Orbitron:wght@400;700;900&family=Uncial+Antiqua&family=Creepster&family=Pirata+One&family=Exo+2:wght@300;700;900&family=IM+Fell+English:ital@1&family=Russo+One&family=Special+Elite&family=Rajdhani:wght@300;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --accent: #ff6b00;
    --accent2: #00f5ff;
    --text: #f0e6d3;
    --panel: rgba(255,255,255,0.04);
    --glow: 0 0 30px var(--accent);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 1s, color 0.5s;
  }

  /* ═══════════════════════════════════════════════════
     SCREENS
  ═══════════════════════════════════════════════════ */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ═══════ LANGUAGE SWITCH ═══════ */
  .lang-switch {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    display: flex; gap: 6px; align-items: center;
  }
  .lang-btn {
    background: var(--panel); border: 1px solid var(--accent);
    color: var(--text); padding: 6px 14px; border-radius: 20px;
    cursor: pointer; font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 13px; letter-spacing: 1px;
    transition: all 0.3s;
  }
  .lang-btn.active { background: var(--accent); color: #000; }

  /* ═══════════════════════════════════════════════════
     HOME SCREEN
  ═══════════════════════════════════════════════════ */
  #screen-home {
    justify-content: center; align-items: center;
    background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a0f 70%);
    padding: 40px;
    position: relative; overflow: hidden;
  }

  .stars {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 30%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 80%, rgba(0,245,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 40%, rgba(255,107,0,0.4) 0%, transparent 100%);
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.6; } to { opacity: 1; } }

  .home-content { text-align: center; z-index: 1; max-width: 1200px; width: 100%; }

  .logo-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    background: linear-gradient(135deg, #ff6b00, #ff0080, #00f5ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    animation: pulseTitle 3s ease-in-out infinite;
    line-height: 1;
    margin-bottom: 8px;
  }
  @keyframes pulseTitle {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3) drop-shadow(0 0 20px #ff6b00); }
  }

  .logo-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    letter-spacing: 8px; color: var(--accent2);
    text-transform: uppercase; margin-bottom: 60px;
    font-weight: 300;
  }

  .stories-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 40px;
  }

  .story-card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px 16px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative; overflow: hidden;
    backdrop-filter: blur(10px);
  }
  .story-card::before {
    content: ''; position: absolute; inset: 0;
    background: var(--card-gradient, linear-gradient(135deg, #ff6b0020, #ff008020));
    opacity: 0; transition: opacity 0.4s;
    border-radius: 16px;
  }
  .story-card:hover { transform: translateY(-8px) scale(1.03); border-color: var(--card-color, #ff6b00); }
  .story-card:hover::before { opacity: 1; }
  .story-card:hover { box-shadow: 0 20px 40px var(--card-shadow, rgba(255,107,0,0.3)); }

  .story-emoji { font-size: 2.5rem; margin-bottom: 10px; display: block; }
  .story-title {
    font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--card-color, #ff6b00); margin-bottom: 6px;
  }
  .story-desc {
    font-size: 0.82rem; color: rgba(240,230,211,0.6); line-height: 1.4;
  }

  .difficulty-badge {
    display: inline-block; margin-top: 10px;
    padding: 2px 10px; border-radius: 20px; font-size: 0.7rem;
    font-weight: 700; letter-spacing: 1px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  }

  /* ═══════════════════════════════════════════════════
     LOBBY SCREEN
  ═══════════════════════════════════════════════════ */
  #screen-lobby {
    justify-content: center; align-items: center;
    padding: 40px; position: relative;
  }

  .lobby-container {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 40px; width: 100%; max-width: 1200px; align-items: start;
  }

  .lobby-story-panel {
    background: var(--panel); border-radius: 20px; padding: 40px;
    border: 1px solid rgba(255,255,255,0.1);
    position: relative; overflow: hidden;
  }

  .lobby-story-emoji { font-size: 6rem; display: block; margin-bottom: 20px; }
  .lobby-story-title {
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    font-weight: 900; margin-bottom: 10px;
    line-height: 1.1;
  }
  .lobby-story-synopsis {
    font-size: 1rem; color: rgba(240,230,211,0.7); line-height: 1.6;
    margin-bottom: 24px;
  }

  .lobby-right { display: flex; flex-direction: column; gap: 24px; }

  .qr-section {
    background: var(--panel); border-radius: 20px; padding: 30px;
    text-align: center; border: 1px solid rgba(255,255,255,0.1);
  }
  .room-code-display {
    font-family: 'Orbitron', sans-serif; font-size: 4rem;
    font-weight: 900; letter-spacing: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: codePulse 2s ease-in-out infinite;
  }
  @keyframes codePulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
  }
  .room-code-label {
    font-size: 0.8rem; letter-spacing: 3px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; margin-bottom: 12px;
  }
  .url-display {
    background: rgba(255,255,255,0.06); border-radius: 10px;
    padding: 10px 16px; font-family: monospace; font-size: 0.9rem;
    color: var(--accent2); margin-top: 12px; word-break: break-all;
  }

  .teams-section {
    background: var(--panel); border-radius: 20px; padding: 24px;
    border: 1px solid rgba(255,255,255,0.1); flex: 1;
  }
  .teams-title {
    font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
    letter-spacing: 3px; color: var(--accent2); margin-bottom: 16px;
    text-transform: uppercase;
  }
  .teams-list { display: flex; flex-direction: column; gap: 10px; max-height: 280px; overflow-y: auto; }
  .team-item {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.08);
    animation: teamJoin 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes teamJoin {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .team-emoji { font-size: 1.5rem; }
  .team-name { font-weight: 700; font-size: 1rem; }
  .team-members { font-size: 0.8rem; color: rgba(255,255,255,0.4); }

  .start-btn {
    width: 100%; padding: 20px; border-radius: 16px; border: none;
    font-family: 'Orbitron', sans-serif; font-size: 1.1rem;
    font-weight: 900; letter-spacing: 3px; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #ff0080);
    color: white; text-transform: uppercase;
    transition: all 0.3s; position: relative; overflow: hidden;
  }
  .start-btn:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(255,107,0,0.5); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .start-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%); animation: shimmer 2s infinite;
  }
  @keyframes shimmer { to { transform: translateX(100%); } }

  /* ═══════════════════════════════════════════════════
     GAME SCREEN
  ═══════════════════════════════════════════════════ */
  #screen-game {
    position: relative; min-height: 100vh;
  }

  .game-bg {
    position: fixed; inset: 0; z-index: 0;
    transition: background 1s;
  }

  .game-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: rgba(0,0,0,0.6);
  }

  .game-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    min-height: 100vh; padding: 24px;
  }

  .game-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }

  .game-story-badge {
    display: flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,0.5); border-radius: 50px;
    padding: 8px 20px; border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
  }

  .phase-indicator {
    font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
    letter-spacing: 2px; color: var(--accent2);
  }

  .timer-display {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900;
    text-align: center; letter-spacing: 4px;
    background: rgba(0,0,0,0.5); border-radius: 16px;
    padding: 12px 30px; border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    transition: color 0.5s;
  }
  .timer-display.urgent { color: #ff3333; animation: timerPulse 0.5s ease-in-out infinite; }
  @keyframes timerPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  .game-main {
    flex: 1; display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 24px; align-items: start;
  }

  .narrative-panel {
    background: rgba(0,0,0,0.6); border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 40px; backdrop-filter: blur(20px);
  }

  .phase-title {
    font-size: clamp(0.8rem, 1.5vw, 1rem); letter-spacing: 4px;
    text-transform: uppercase; color: var(--accent2); margin-bottom: 12px;
  }

  .narrative-title {
    font-weight: 900; font-size: clamp(1.8rem, 4vw, 3rem);
    margin-bottom: 20px; line-height: 1.1;
  }

  .narrative-text {
    font-size: clamp(0.95rem, 1.5vw, 1.15rem); line-height: 1.7;
    color: rgba(240,230,211,0.85); margin-bottom: 30px;
  }

  .enigma-box {
    background: rgba(255,255,255,0.05); border-radius: 16px;
    padding: 28px; border: 1px solid rgba(255,255,255,0.15);
    position: relative;
  }
  .enigma-label {
    font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
    letter-spacing: 3px; color: var(--accent); margin-bottom: 12px;
    text-transform: uppercase;
  }
  .enigma-text {
    font-size: clamp(1.1rem, 2vw, 1.4rem); font-weight: 700;
    line-height: 1.4;
  }
  .enigma-hint {
    margin-top: 12px; font-size: 0.85rem;
    color: rgba(255,255,255,0.4); font-style: italic;
  }

  .voice-btn {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50px; padding: 10px 20px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: 0.9rem; color: var(--text); letter-spacing: 1px;
    transition: all 0.3s; margin-top: 20px;
  }
  .voice-btn:hover { background: rgba(255,255,255,0.15); }
  .voice-btn.speaking { background: rgba(255,107,0,0.2); border-color: var(--accent); }

  .sidebar-panel {
    display: flex; flex-direction: column; gap: 20px;
  }

  .ranking-panel {
    background: rgba(0,0,0,0.6); border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 24px; backdrop-filter: blur(20px);
  }
  .ranking-title {
    font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
    letter-spacing: 3px; color: var(--accent); margin-bottom: 16px;
    text-transform: uppercase;
  }
  .ranking-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: all 0.5s;
  }
  .ranking-pos {
    font-family: 'Orbitron', sans-serif; font-size: 1rem;
    font-weight: 900; width: 30px; text-align: center;
  }
  .pos-1 { color: #FFD700; }
  .pos-2 { color: #C0C0C0; }
  .pos-3 { color: #CD7F32; }
  .ranking-team { flex: 1; }
  .ranking-team-name { font-weight: 700; font-size: 0.95rem; }
  .ranking-score {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    color: var(--accent2); font-size: 1rem;
  }
  .score-bar {
    height: 4px; background: rgba(255,255,255,0.1);
    border-radius: 2px; margin-top: 4px; overflow: hidden;
  }
  .score-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .answers-panel {
    background: rgba(0,0,0,0.6); border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 24px; backdrop-filter: blur(20px);
  }
  .answer-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    animation: answerIn 0.4s ease;
  }
  @keyframes answerIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .answer-correct { color: #00ff88; }
  .answer-wrong { color: #ff4444; }

  .ctrl-panel {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    margin-top: 20px;
  }
  .ctrl-btn {
    padding: 10px 24px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05); color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: 0.9rem; cursor: pointer; transition: all 0.3s; letter-spacing: 1px;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.12); }
  .ctrl-btn.primary { background: var(--accent); border-color: var(--accent); color: #000; }
  .ctrl-btn.danger { border-color: #ff4444; color: #ff4444; }
  .ctrl-btn.danger:hover { background: rgba(255,68,68,0.15); }

  /* ═══════════════════════════════════════════════════
     WINNER SCREEN
  ═══════════════════════════════════════════════════ */
  #screen-winner {
    justify-content: center; align-items: center;
    background: radial-gradient(ellipse at center, #1a0d00 0%, #0a0a0f 70%);
    text-align: center; padding: 40px; position: relative; overflow: hidden;
  }

  .confetti-container {
    position: absolute; inset: 0; pointer-events: none;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px;
    animation: confettiFall linear infinite;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .winner-crown { font-size: 6rem; animation: crownBounce 1s ease-in-out infinite; }
  @keyframes crownBounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
  }

  .winner-label {
    font-family: 'Orbitron', sans-serif; font-size: 0.9rem;
    letter-spacing: 6px; color: var(--accent2); margin: 20px 0 10px;
    text-transform: uppercase;
  }
  .winner-name {
    font-weight: 900; font-size: clamp(3rem, 8vw, 6rem);
    background: linear-gradient(135deg, #FFD700, #ff6b00, #ff0080);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 20px; line-height: 1;
  }
  .winner-score {
    font-family: 'Orbitron', sans-serif; font-size: 1.5rem;
    color: var(--accent2); margin-bottom: 40px;
  }

  .podium-grid {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 20px; margin: 30px 0;
  }
  .podium-item {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .podium-emoji { font-size: 2rem; }
  .podium-team-name { font-weight: 700; font-size: 0.85rem; max-width: 100px; }
  .podium-score-val { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--accent2); }
  .podium-bar {
    width: 80px; border-radius: 8px 8px 0 0;
    background: linear-gradient(180deg, var(--accent), rgba(255,107,0,0.3));
  }
  .podium-bar.p1 { height: 120px; background: linear-gradient(180deg, #FFD700, rgba(255,215,0,0.3)); }
  .podium-bar.p2 { height: 80px; background: linear-gradient(180deg, #C0C0C0, rgba(192,192,192,0.3)); }
  .podium-bar.p3 { height: 50px; background: linear-gradient(180deg, #CD7F32, rgba(205,127,50,0.3)); }

  .mission-badge {
    background: rgba(255,107,0,0.1); border: 1px solid var(--accent);
    border-radius: 12px; padding: 16px 24px; margin: 20px auto;
    max-width: 600px; display: flex; align-items: center; gap: 12px;
  }
  .mission-badge-icon { font-size: 1.5rem; }
  .mission-badge-text { font-size: 0.9rem; line-height: 1.5; color: rgba(255,255,255,0.8); }

  /* ═══════════════════════════════════════════════════
     TRANSITIONS
  ═══════════════════════════════════════════════════ */
  .fade-in { animation: fadeIn 0.8s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

  .notification {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-100px);
    background: rgba(0,0,0,0.9); border: 1px solid var(--accent);
    border-radius: 12px; padding: 16px 30px; z-index: 9999;
    font-weight: 700; font-size: 1rem; letter-spacing: 1px;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    backdrop-filter: blur(20px);
  }
  .notification.show { transform: translateX(-50%) translateY(0); }

  .mission-popup {
    position: fixed; inset: 0; z-index: 9998;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .mission-popup.show { display: flex; }
  .mission-card {
    background: linear-gradient(135deg, #1a0a2e, #0f0f1a);
    border: 2px solid var(--accent); border-radius: 24px;
    padding: 50px; max-width: 600px; text-align: center;
    animation: missionAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes missionAppear {
    from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .mission-icon { font-size: 5rem; margin-bottom: 20px; }
  .mission-title {
    font-family: 'Orbitron', sans-serif; font-size: 1.5rem;
    color: var(--accent); margin-bottom: 16px; letter-spacing: 3px;
  }
  .mission-desc { font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
  .mission-secret {
    background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.3);
    border-radius: 10px; padding: 16px; font-size: 0.9rem;
    color: rgba(255,255,255,0.6); margin-bottom: 24px;
  }
</style>
</head>
<body>

<!-- Language Switch -->
<div class="lang-switch">
  <button class="lang-btn active" onclick="setLang('es')" id="btn-es">ES</button>
  <button class="lang-btn" onclick="setLang('ca')" id="btn-ca">CA</button>
</div>

<!-- Notification -->
<div class="notification" id="notification"></div>

<!-- Mission Popup -->

        enigma: { es: 'Años del profesor más veterano MENOS años del profesor más nuevo en el centro. (El organizador define los valores reales antes del juego)', ca: "Anys del professor més veterà MENYS anys del professor més nou al centre. (L'organitzador defineix els valors reals abans del joc)" },
        answer: 'VARIABLE',
        hint: { es: '¡Preguntad a vuestros compañeros! Es información del propio claustro.', ca: "Pregunteu als vostres companys! És informació del propi claustre." },
        mission: { es: 'Un/a profesor/a debe ir a buscar a un alumno de 1º de ESO que está en el pasillo con un sobre con el símbolo 👩‍🏫. El alumno ha sido preparado previamente para esta misión.', ca: "Un/a professor/a ha d'anar a buscar un alumne de 1r d'ESO que és al passadís amb un sobre amb el símbol 👩‍🏫. L'alumne ha estat preparat prèviament per a aquesta missió." },
        missionIcon: '👦',
        points: 150
      },
      {
        name: { es: 'LA SALIDA', ca: 'LA SORTIDA' },
        narrativeTitle: { es: 'El examen final', ca: "L'examen final" },
        narrativeText: { es: '¡Irónico! Los profesores tienen que hacer un examen. La nota mínima para salir es un 5. El examen tiene 20 preguntas de 0.5 puntos cada una. Para aprobar, ¿cuántas preguntas deben responder correctamente como mínimo?', ca: "Irònic! Els professors han de fer un examen. La nota mínima per sortir és un 5. L'examen té 20 preguntes de 0.5 punts cadascuna. Per aprovar, quantes preguntes han de respondre correctament com a mínim?" },
        enigma: { es: 'Nota mínima: 5/10. Cada pregunta vale 0.5 puntos. Para llegar al 5, necesitáis X preguntas bien. ¿Cuántas? Eso es el código numérico de la cerradura.', ca: "Nota mínima: 5/10. Cada pregunta val 0.5 punts. Per arribar al 5, necessiteu X preguntes bé. Quantes? Això és el codi numèric del pany." },
        answer: '10',
        hint: { es: '5 ÷ 0.5 = ?', ca: "5 ÷ 0.5 = ?" },
        points: 200,
        isFinal: true
      }
    ]
  }
];

// ═══════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════
let currentStory = null;
let currentPhase = 0;
let roomCode = '';
let teams = [];
let gameTimer = null;
let timeLeft = 0;
let isSpeaking = false;
let answers = [];

function generateRoomCode() {
  return Math.random().toString(36).substring(2, 6).toUpperCase();
}

function saveState() {
  const state = { roomCode, teams, currentStory: currentStory?.id, currentPhase, answers, timeLeft };
  localStorage.setItem('escapeclass_projector', JSON.stringify(state));
  localStorage.setItem('escapeclass_gamestate', JSON.stringify(state));
}

function loadState() {
  try {
    const raw = localStorage.getItem('escapeclass_projector');
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// ═══════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function showNotification(msg, duration = 3000) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ═══════════════════════════════════════════════════
// HOME SCREEN
// ═══════════════════════════════════════════════════
function renderHomeScreen() {
  const grid = document.getElementById('storiesGrid');
  grid.innerHTML = '';
  STORIES.forEach(story => {
    const card = document.createElement('div');
    card.className = 'story-card';
    card.style.setProperty('--card-color', story.color);
    card.style.setProperty('--card-gradient', story.gradient + '40');
    card.style.setProperty('--card-shadow', story.color + '40');
    card.innerHTML = `
      <span class="story-emoji">${story.emoji}</span>
      <div class="story-title" style="font-family:${story.font}">${story.title[currentLang]}</div>
      <div class="story-desc">${story.desc[currentLang]}</div>
      <span class="difficulty-badge" style="border-color:${story.color}40; color:${story.color};">
        ${story.difficulty[currentLang]}
      </span>
    `;
    card.onclick = () => selectStory(story);
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════
// LOBBY
// ═══════════════════════════════════════════════════
function selectStory(story) {
  currentStory = story;
  currentPhase = 0;
  answers = [];
  roomCode = generateRoomCode();
  teams = [];

  // Set theme
  document.documentElement.style.setProperty('--accent', story.color);

  // Fill lobby
  document.getElementById('lobbyEmoji').textContent = story.emoji;
  document.getElementById('lobbyTitle').textContent = story.title[currentLang];
  document.getElementById('lobbyTitle').style.fontFamily = story.font;
  document.getElementById('lobbySynopsis').textContent = story.synopsis[currentLang];
  document.getElementById('lobbyDifficulty').textContent = story.difficulty[currentLang];
  document.getElementById('lobbyDuration').textContent = story.duration[currentLang];
  document.getElementById('roomCode').textContent = roomCode;
  document.getElementById('lobbyBg').style.background = story.bgGradient;

  const mobileUrl = `${window.location.href.replace('proyector.html','').replace(window.location.search,'')}movil.html?sala=${roomCode}`;
  document.getElementById('mobileUrl').textContent = mobileUrl;

  // Phases list
  const phasesList = document.getElementById('phasesList');
  phasesList.innerHTML = story.phases.map((p, i) => `
    <div style="display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
      <span style="font-family:'Orbitron',sans-serif; font-size:0.7rem; color:${story.color};">
        ${t('phase')} ${i+1}
      </span>
      <span style="font-size:0.85rem; opacity:0.7;">${p.name[currentLang]}</span>
      ${p.isFinal ? '<span style="font-size:0.7rem; color:#ff6b00; margin-left:auto;">🏆 FINAL</span>' : ''}
    </div>
  `).join('');

  saveState();
  startListeningForTeams();
  showScreen('lobby');
}

function startListeningForTeams() {
  if (window._teamInterval) clearInterval(window._teamInterval);
  window._teamInterval = setInterval(updateTeamsDisplay, 1000);
}

function updateTeamsDisplay() {
  try {
    const raw = localStorage.getItem('escapeclass_teams_' + roomCode);
    if (!raw) return;
    const incoming = JSON.parse(raw);
    if (incoming.length !== teams.length) {
      teams = incoming;
      renderTeams();
      document.getElementById('startGameBtn').disabled = teams.length === 0;
    }
  } catch {}
}

function renderTeams() {
  const list = document.getElementById('teamsList');
  document.getElementById('teamsCount').textContent = ` (${teams.length})`;
  if (teams.length === 0) {
    list.innerHTML = `<div style="color:rgba(255,255,255,0.2); font-size:0.85rem; font-style:italic;">${t('waiting_teams')}</div>`;
    return;
  }
  list.innerHTML = teams.map(team => `
    <div class="team-item">
      <span class="team-emoji">${team.emoji || '⚡'}</span>
      <div>
        <div class="team-name">${team.name}</div>
        <div class="team-members">${team.members || ''}</div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════
// GAME
// ═══════════════════════════════════════════════════
function startGame() {
  if (window._teamInterval) clearInterval(window._teamInterval);
  
  // Parse duration
  const durStr = currentStory.duration[currentLang];
  const mins = parseInt(durStr) || 45;
  timeLeft = mins * 60;
  
  setGameBackground();
  renderGamePhase();
  startTimer();
  startAnswerPolling();
  showScreen('game');
  renderRanking();
}

function setGameBackground() {
  document.getElementById('gameBg').style.background = currentStory.bgGradient;
}

function renderGamePhase() {
  const phase = currentStory.phases[currentPhase];
  const story = currentStory;

  document.getElementById('gameEmoji').textContent = story.emoji;
  document.getElementById('gameTitle').textContent = story.title[currentLang];
  document.getElementById('gameTitle').style.fontFamily = story.font;
  document.getElementById('phaseIndicator').textContent = `${t('phase')} ${currentPhase + 1} ${t('of')} ${story.phases.length}`;

  document.getElementById('gamePhaseName').textContent = phase.name[currentLang];
  document.getElementById('gameNarrativeTitle').textContent = phase.narrativeTitle[currentLang];
  document.getElementById('gameNarrativeTitle').style.fontFamily = story.font;
  document.getElementById('gameNarrativeText').textContent = phase.narrativeText[currentLang];
  document.getElementById('gameEnigmaText').textContent = phase.enigma[currentLang];
  document.getElementById('gameEnigmaHint').textContent = '';

  // Show/hide mission btn
  const missionBtn = document.getElementById('missionBtn');
  missionBtn.style.display = phase.mission ? 'flex' : 'none';

  // Broadcast phase to mobiles
  broadcastPhase(phase);

  saveState();
}

function broadcastPhase(phase) {
  const data = {
    phase: currentPhase,
    enigma: phase.enigma[currentLang],
    phaseName: phase.name[currentLang],
    isFinal: !!phase.isFinal,
    answer: phase.answer,
    points: phase.points,
    storyId: currentStory.id,
    storyColor: currentStory.color,
    storyFont: currentStory.font,
    roomCode
  };
  localStorage.setItem('escapeclass_phase_' + roomCode, JSON.stringify(data));
  // Clear previous answers for new phase
  localStorage.removeItem('escapeclass_answers_' + roomCode);
  answers = [];
  document.getElementById('answersList').innerHTML = '';
}

function startTimer() {
  if (gameTimer) clearInterval(gameTimer);
  gameTimer = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(gameTimer);
      showNotification(t('time_up'));
      endGame();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const display = document.getElementById('timerDisplay');
  display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  display.classList.toggle('urgent', timeLeft < 120);
}

function startAnswerPolling() {
  if (window._answerInterval) clearInterval(window._answerInterval);
  window._answerInterval = setInterval(pollAnswers, 1500);
}

function pollAnswers() {
  try {
    const raw = localStorage.getItem('escapeclass_answers_' + roomCode);
    if (!raw) return;
    const incoming = JSON.parse(raw);
    if (incoming.length > answers.length) {
      const newAnswers = incoming.slice(answers.length);
      answers = incoming;
      newAnswers.forEach(ans => displayAnswer(ans));
      updateRanking(incoming);
    }
  } catch {}
}

function displayAnswer(ans) {
  const list = document.getElementById('answersList');
  const phase = currentStory.phases[currentPhase];
  const correct = ans.answer?.toLowerCase().trim() === phase.answer?.toLowerCase().trim() || phase.answer === 'VARIABLE';
  const div = document.createElement('div');
  div.className = 'answer-item';
  div.innerHTML = `
    <span>${ans.emoji || '⚡'} ${ans.teamName}</span>
    <span class="${correct ? 'answer-correct' : 'answer-wrong'}">${ans.answer} ${correct ? t('correct') : t('wrong')}</span>
  `;
  list.prepend(div);

  const count = document.getElementById('answersCount');
  count.textContent = `${answers.length} respuesta(s) recibida(s)`;
}

function updateRanking(incomingAnswers) {
  // Aggregate scores from all stored answers
  try {
    const raw = localStorage.getItem('escapeclass_scores_' + roomCode);
    renderRanking();
  } catch {}
}

function renderRanking() {
  try {
    const raw = localStorage.getItem('escapeclass_scores_' + roomCode);
    const scores = raw ? JSON.parse(raw) : {};
    const list = document.getElementById('rankingList');

    if (Object.keys(scores).length === 0) {
      list.innerHTML = '<div style="color:rgba(255,255,255,0.3); font-size:0.8rem;">Sin puntuaciones aún</div>';
      return;
    }

    const sorted = Object.entries(scores).sort((a,b) => b[1].score - a[1].score);
    const maxScore = sorted[0]?.[1].score || 1;

    list.innerHTML = sorted.slice(0,5).map(([id, data], i) => `
      <div class="ranking-item">
        <div class="ranking-pos ${i === 0 ? 'pos-1' : i === 1 ? 'pos-2' : i === 2 ? 'pos-3' : ''}">
          ${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1}
        </div>
        <div class="ranking-team">
          <div class="ranking-team-name">${data.emoji || '⚡'} ${data.name}</div>
          <div class="score-bar"><div class="score-fill" style="width:${(data.score/maxScore*100)}%"></div></div>
        </div>
        <div class="ranking-score">${data.score} ${t('pts')}</div>
      </div>
    `).join('');
  } catch {}
}

function nextPhase() {
  if (currentPhase < currentStory.phases.length - 1) {
    currentPhase++;
    renderGamePhase();
    showNotification(`${t('phase')} ${currentPhase + 1} — ${currentStory.phases[currentPhase].name[currentLang]}`);
  } else {
    endGame();
  }
}

function revealHint() {
  const phase = currentStory.phases[currentPhase];
  document.getElementById('gameEnigmaHint').textContent = phase.hint?.[currentLang] || '';
  showNotification(t('hint_revealed'));
}

function showMission() {
  const phase = currentStory.phases[currentPhase];
  if (!phase.mission) return;
  document.getElementById('missionIcon').textContent = phase.missionIcon || '🎯';
  document.getElementById('missionTitle').textContent = currentLang === 'es' ? '¡MISIÓN EXTERIOR!' : 'MISSIÓ EXTERIOR!';
  document.getElementById('missionDesc').textContent = phase.mission[currentLang];
  document.getElementById('missionSecret').textContent = currentLang === 'es'
    ? '⚠️ Preparativo previo: el profesor debe haber dejado el sobre/pista en el lugar indicado antes del juego.'
    : '⚠️ Preparatiu previ: el professor ha d\'haver deixat el sobre/pista al lloc indicat abans del joc.';
  document.getElementById('missionPopup').classList.add('show');
}

function closeMission() {
  document.getElementById('missionPopup').classList.remove('show');
}

// ═══════════════════════════════════════════════════
// VOICE
// ═══════════════════════════════════════════════════
function toggleVoice() {
  if (isSpeaking) {
    speechSynthesis.cancel();
    isSpeaking = false;
    document.getElementById('voiceBtn').classList.remove('speaking');
    return;
  }
  const phase = currentStory.phases[currentPhase];
  const text = `${phase.narrativeTitle[currentLang]}. ${phase.narrativeText[currentLang]}. ${phase.enigma[currentLang]}`;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = currentLang === 'ca' ? 'ca-ES' : 'es-ES';
  utter.rate = 0.9;
  utter.pitch = 0.8;
  utter.onend = () => {
    isSpeaking = false;
    document.getElementById('voiceBtn').classList.remove('speaking');
  };
  speechSynthesis.speak(utter);
  isSpeaking = true;
  document.getElementById('voiceBtn').classList.add('speaking');
}

// ═══════════════════════════════════════════════════
// END GAME
// ═══════════════════════════════════════════════════
function endGame() {
  if (gameTimer) clearInterval(gameTimer);
  if (window._answerInterval) clearInterval(window._answerInterval);

  const raw = localStorage.getItem('escapeclass_scores_' + roomCode);
  const scores = raw ? JSON.parse(raw) : {};
  const sorted = Object.entries(scores).sort((a,b) => b[1].score - a[1].score);

  if (sorted.length === 0) {
    // No scores, still show screen
    document.getElementById('winnerName').textContent = currentLang === 'es' ? '¡Todos escaparon!' : 'Tots van escapar!';
    document.getElementById('winnerScore').textContent = '';
    document.getElementById('podiumGrid').innerHTML = '';
  } else {
    const winner = sorted[0][1];
    document.getElementById('winnerName').textContent = `${winner.emoji || '⚡'} ${winner.name}`;
    document.getElementById('winnerScore').textContent = `${winner.score} ${t('pts')}`;
    renderPodium(sorted);
  }

  spawnConfetti();

  // Final mission badge
  const lastPhase = currentStory.phases[currentStory.phases.length - 1];
  if (lastPhase.mission) {
    document.getElementById('finalMissionBadge').style.display = 'flex';
    document.getElementById('finalMissionText').textContent = lastPhase.mission[currentLang];
  }

  showScreen('winner');
  speakWinner();
}

function renderPodium(sorted) {
  const grid = document.getElementById('podiumGrid');
  const order = [1, 0, 2]; // Silver, Gold, Bronze visual order
  const classes = ['p2', 'p1', 'p3'];
  const medals = ['🥈', '🥇', '🥉'];

  grid.innerHTML = order.map((idx, vi) => {
    if (!sorted[idx]) return '';
    const [, data] = sorted[idx];
    return `
      <div class="podium-item">
        <div class="podium-emoji">${medals[vi]}</div>
        <div class="podium-team-name">${data.emoji || '⚡'} ${data.name}</div>
        <div class="podium-score-val">${data.score} pts</div>
        <div class="podium-bar ${classes[vi]}"></div>
      </div>
    `;
  }).join('');
}

function speakWinner() {
  const text = currentLang === 'es'
    ? `¡Enhorabuena! Han completado el escape room. ¡Misión cumplida!`
    : `Enhorabona! Han completat l'escape room. Missió complerta!`;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = currentLang === 'ca' ? 'ca-ES' : 'es-ES';
  utter.rate = 0.85; utter.pitch = 1.1;
  speechSynthesis.speak(utter);
}

function spawnConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#ff6b00', '#00f5ff', '#ff0080', '#FFD700', '#00ff88', '#ff3333'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${4 + Math.random() * 10}px;
      height: ${4 + Math.random() * 10}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
      animation-duration: ${2 + Math.random() * 4}s;
      animation-delay: ${Math.random() * 2}s;
    `;
    container.appendChild(piece);
  }
}

function playAgain() {
  if (currentStory) selectStory(currentStory);
}

function confirmReset() {
  if (confirm(currentLang === 'es' ? '¿Terminar el juego?' : 'Acabar el joc?')) {
    if (gameTimer) clearInterval(gameTimer);
    if (window._answerInterval) clearInterval(window._answerInterval);
    localStorage.removeItem('escapeclass_gamestate');
    showScreen('home');
  }
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderHomeScreen();
// Poll ranking every 2s while on game screen
setInterval(() => {
  if (document.getElementById('screen-game').classList.contains('active')) {
    renderRanking();
  }
}, 2000);
</script>
